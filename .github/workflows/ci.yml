name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    # Fork PRs don't run CI: PRs from outside the org must be pulled
    # into a repo branch by a maintainer first (supply-chain guard).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out moddef (tooling + stdlib)
        uses: actions/checkout@v4
        with:
          repository: ModDefOrg/moddef
          path: _moddef

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build the moddef CLI
        run: |
          cd _moddef
          buf generate
          cd go && go build -o /tmp/moddef ./cmd/moddef

      - name: Lint every profile (0 errors required)
        run: |
          export MODDEF_PACKAGE_ROOTS="$PWD/_moddef/stdlib"
          fail=0
          while IFS= read -r f; do
            if out=$(/tmp/moddef lint "$f" 2>&1); then
              echo "ok   $f"
            else
              echo "::error::$f failed lint"; echo "$out"; fail=1
            fi
          done < <(find . -path ./_moddef -prune -o -name '*.moddef.yaml' -print | sort)
          exit $fail
