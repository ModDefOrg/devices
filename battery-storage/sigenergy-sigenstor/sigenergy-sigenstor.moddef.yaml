            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 602, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: "%"
            measurand: { base_quantity: state_of_health, location: BATTERY }

          - point_id: battery_cell_temperature
            name: Battery Average Cell Temperature
            description: Average battery cell temperature
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 603, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: degC
            measurand: { base_quantity: temperature, location: BATTERY }

          - point_id: battery_cell_voltage
            name: Battery Average Cell Voltage
            description: Average battery cell voltage
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 604, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 1000 } }
            unit: V
            measurand: { base_quantity: battery_voltage }

          - point_id: inverter_alarm1
            name: Inverter Alarm 1
            description: Inverter alarm bitfield 1 (see protocol appendix 2)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 605, length_words: 1, byte_order: BIG_ENDIAN }
            measurand: { base_quantity: alarm_status }

          - point_id: inverter_alarm2
            name: Inverter Alarm 2
            description: Inverter alarm bitfield 2 (see protocol appendix 3)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 606, length_words: 1, byte_order: BIG_ENDIAN }
            measurand: { base_quantity: alarm_status }

          - point_id: inverter_alarm3
            name: Inverter Alarm 3
            description: Inverter alarm bitfield 3 (see protocol appendix 4)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 607, length_words: 1, byte_order: BIG_ENDIAN }
            measurand: { base_quantity: alarm_status }

          - point_id: inverter_alarm4
            name: Inverter Alarm 4
            description: Inverter alarm bitfield 4 (see protocol appendix 5)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 608, length_words: 1, byte_order: BIG_ENDIAN }
            measurand: { base_quantity: alarm_status }

      # --- 5.3 Hybrid inverter running info: AC measurements + PV strings --
      #        (read-only, per-inverter slave address)
      - block_id: inverter_ac
        name: Hybrid Inverter AC & PV Measurements (read-only)
        space: INPUT_REGISTER
        start_offset: 1000
        length_words: 42
        points:
          - point_id: rated_grid_voltage
            name: Rated Grid Voltage
            description: Inverter rated grid voltage
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1000, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: V

          - point_id: rated_grid_frequency
            name: Rated Grid Frequency
            description: Inverter rated grid frequency
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1001, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: Hz

          - point_id: grid_frequency
            name: Grid Frequency
            description: Measured grid frequency
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1002, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: Hz
            measurand: { base_quantity: frequency }

          - point_id: internal_temperature
            name: PCS Internal Temperature
            description: Power conversion system internal temperature
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1003, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: degC
            measurand: { base_quantity: inverter_temperature, location: INTERNAL }

          - point_id: output_type
            name: Output Type
            description: AC output wiring type - 0 L/N, 1 L1/L2/L3, 2 L1/L2/L3/N, 3 L1/L2/N
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1004, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: line_voltage_l1_l2
            name: A-B Line Voltage
            description: Line-to-line voltage A-B; invalid when output type is L/N or L1/L2/N
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1005, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L1_L2 }

          - point_id: line_voltage_l2_l3
            name: B-C Line Voltage
            description: Line-to-line voltage B-C; invalid when output type is L/N or L1/L2/N
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1007, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L2_L3 }

          - point_id: line_voltage_l3_l1
            name: C-A Line Voltage
            description: Line-to-line voltage C-A; invalid when output type is L/N or L1/L2/N
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1009, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L3_L1 }

          - point_id: voltage_l1
            name: Phase A Voltage
            description: Phase A voltage (phase voltage when output type is L/N)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1011, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L1_N }

          - point_id: voltage_l2
            name: Phase B Voltage
            description: Phase B voltage; invalid when output type is L/N or L1/L2/N
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1013, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L2_N }

          - point_id: voltage_l3
            name: Phase C Voltage
            description: Phase C voltage; invalid when output type is L/N or L1/L2/N
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1015, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L3_N }

          - point_id: current_l1
            name: Phase A Current
            description: Phase A current (phase current when output type is L/N)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1017, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: A
            measurand: { base_quantity: current, phase_ref: L1 }

          - point_id: current_l2
            name: Phase B Current
            description: Phase B current; invalid when output type is L/N or L1/L2/N
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1019, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: A
            measurand: { base_quantity: current, phase_ref: L2 }

          - point_id: current_l3
            name: Phase C Current
            description: Phase C current; invalid when output type is L/N or L1/L2/N
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1021, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: A
            measurand: { base_quantity: current, phase_ref: L3 }

          - point_id: power_factor
            name: Power Factor
            description: Inverter power factor
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1023, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 1000 } }
            unit: "1"
            measurand: { base_quantity: power_factor, aggregation: TOTAL }

          - point_id: pack_count
            name: Battery Pack Count
            description: Number of battery packs attached to this inverter
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1024, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: pv_string_count
            name: PV String Count
            description: Number of PV strings
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1025, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: mppt_count
            name: MPPT Count
            description: Number of MPPT trackers
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1026, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: pv1_voltage
            name: PV1 Voltage
            description: PV string 1 voltage
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1027, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: V
            measurand: { base_quantity: pv_voltage }

          - point_id: pv1_current
            name: PV1 Current
            description: PV string 1 current
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1028, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: A
            measurand: { base_quantity: pv_current }

          - point_id: pv2_voltage
            name: PV2 Voltage
            description: PV string 2 voltage
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1029, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: V
            measurand: { base_quantity: pv_voltage }

          - point_id: pv2_current
            name: PV2 Current
            description: PV string 2 current
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1030, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: A
            measurand: { base_quantity: pv_current }

          - point_id: pv3_voltage
            name: PV3 Voltage
            description: PV string 3 voltage
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1031, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: V
            measurand: { base_quantity: pv_voltage }

          - point_id: pv3_current
            name: PV3 Current
            description: PV string 3 current
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1032, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: A
            measurand: { base_quantity: pv_current }

          - point_id: pv4_voltage
            name: PV4 Voltage
            description: PV string 4 voltage
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1033, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: V
            measurand: { base_quantity: pv_voltage }

          - point_id: pv4_current
            name: PV4 Current
            description: PV string 4 current
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1034, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: A
            measurand: { base_quantity: pv_current }

          - point_id: inverter_pv_power
            name: Inverter PV Power
            description: Total PV power for this inverter
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1035, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 1000 } }
            unit: kW
            measurand: { base_quantity: pv_power }

          - point_id: insulation_resistance
            name: Insulation Resistance
            description: PV array insulation resistance to ground (vendor reports raw/1000 in megaohms; scaled here to ohms)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1037, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1000, denominator: 1 } }
            unit: Ohm

          - point_id: startup_time
            name: Startup Time
            description: Most recent startup time, epoch seconds
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1038, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: s

          - point_id: shutdown_time
            name: Shutdown Time
            description: Most recent shutdown time, epoch seconds
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1040, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: s

      # --- 5.3 Hybrid inverter running info: integrated DC charger ---------
      #        (read-only, per-inverter slave address; DC EV charger option)
      - block_id: dc_charger
        name: DC Charger (read-only)
        space: INPUT_REGISTER
        start_offset: 1500
        length_words: 9
        points:
          - point_id: dc_vehicle_battery_voltage
            name: DC Charger Vehicle Battery Voltage
            description: Connected vehicle battery voltage
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1500, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: V
            measurand: { base_quantity: voltage, location: EV }

          - point_id: dc_charging_current
            name: DC Charger Charging Current
            description: DC charging current
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1501, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: A
            measurand: { base_quantity: current, location: EV }

          - point_id: dc_output_power
            name: DC Charger Output Power
            description: DC charger output power
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1502, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 1000 } }
            unit: kW
            measurand: { base_quantity: active_power, location: EV }

          - point_id: dc_vehicle_soc
            name: DC Charger Vehicle SOC
            description: Connected vehicle state of charge
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1504, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: "%"
            measurand: { base_quantity: state_of_charge, location: EV }

          - point_id: dc_charging_capacity
            name: DC Charger Session Energy
            description: Energy delivered in the current charging session
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 1505, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: kWh
            measurand: { base_quantity: energy_active, direction: CHARGE, accumulation: SESSION, location: EV }

          - point_id: dc_charging_duration
            name: DC Charger Session Duration
            description: Elapsed time in the current charging session
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1507, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: s

      # --- 5.4 Hybrid inverter parameter setting (holding) ----------------
      #        (per-inverter slave address)
      - block_id: inverter_control
        name: Hybrid Inverter Control (holding registers)
        space: HOLDING_REGISTER
        start_offset: 500
        length_words: 2
        points:
          - point_id: inverter_start_stop
            name: Inverter Start/Stop
            description: Inverter start/stop command - 0 stop, 1 start
            access: WRITE_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 500, length_words: 1, byte_order: BIG_ENDIAN }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]

          - point_id: grid_code
            name: Grid Code
            description: Inverter grid-code selector
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 501, length_words: 1, byte_order: BIG_ENDIAN }
            write:
              behavior: DIRECT

      # --- 5.4 DC charger control (holding, per-inverter slave address) ----
      - block_id: dc_charger_control
        name: DC Charger Control (holding registers)
        space: HOLDING_REGISTER
        start_offset: 1000
        length_words: 1
        points:
          - point_id: dc_charger_start_stop
            name: DC Charger Start/Stop
            description: DC charger command - 0 start, 1 stop (note the vendor's reversed encoding)
            access: WRITE_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 1000, length_words: 1, byte_order: BIG_ENDIAN }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]
