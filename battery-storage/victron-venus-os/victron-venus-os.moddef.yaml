      # Directional overlay (overlay: true permits register overlap with the
      # `system` block, MDE301). The signed grid and battery registers carry
      # both flow directions in their sign; these points name the IMPORT/EXPORT
      # and DISCHARGE interpretations explicitly for clients that key on a
      # specific direction.
      - block_id: system_directional
        name: System Directional Views
        space: HOLDING_REGISTER
        start_offset: 820
        length_words: 24
        overlay: true
        points:
          - point_id: grid_l1_import_power
            name: Grid L1 Import Power
            description: Import (consumption) interpretation of the signed L1 grid register at 820
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 820
              length_words: 1
            measurand:
              base_quantity: active_power
              phase_ref: L1
              direction: IMPORT
              location: GRID
            unit: W

          - point_id: grid_l1_export_power
            name: Grid L1 Export Power
            description: Export (feed-in) interpretation of the signed L1 grid register at 820
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 820
              length_words: 1
            measurand:
              base_quantity: active_power
              phase_ref: L1
              direction: EXPORT
              location: GRID
            unit: W

          - point_id: battery_discharge_power
            name: Battery Discharge Power (System)
            description: Discharge interpretation of the signed battery power register at 842
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 842
              length_words: 1
            measurand:
              base_quantity: battery_power
              direction: DISCHARGE
              location: BATTERY
            unit: W

      # Dynamic ESS status page (addresses 5400-5407).
      - block_id: dynamic_ess
        name: Dynamic ESS Status
        space: HOLDING_REGISTER
        start_offset: 5400
        length_words: 8
        points:
          - point_id: dess_active
            name: Dynamic ESS State
            description: Dynamic ESS state (address 5400; 0 off, 1 active)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 5400, length_words: 1 }
            measurand: { base_quantity: device_status }

          - point_id: dess_allow_grid_feed_in
            name: Allow Grid Feed-In
            description: Whether grid feed-in is allowed by Dynamic ESS (address 5401; 0 not allowed, 1 allowed)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 5401, length_words: 1 }

          - point_id: dess_available
            name: Dynamic ESS Available
            description: Whether the system is capable of Dynamic ESS (address 5402; 0 no, 1 yes)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 5402, length_words: 1 }

          - point_id: dess_charge_rate
            name: Dynamic ESS Charge Rate
            description: Calculated rate of charge/discharge (address 5403; vendor scale factor 0.1, value = raw x 10)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 5403, length_words: 1 }
            transform: { scale: { numerator: 10, denominator: 1 } }

          - point_id: dess_error
            name: Dynamic ESS Error
            description: Dynamic ESS error code (address 5404)
            access: READ_ONLY
            storage_type: U16
            value_type:
              enum_ref:
                type_id: dess_error
            mapping: { space: HOLDING_REGISTER, offset: 5404, length_words: 1 }
            measurand: { base_quantity: fault_code }

          - point_id: dess_restrictions
            name: Dynamic ESS Active Restrictions
            description: Active battery/grid flow restrictions (address 5405)
            access: READ_ONLY
            storage_type: U16
            value_type:
              enum_ref:
                type_id: dess_restrictions
            mapping: { space: HOLDING_REGISTER, offset: 5405, length_words: 1 }

          - point_id: dess_strategy
            name: Dynamic ESS Strategy
            description: Strategy used for the current time slot (address 5406)
            access: READ_ONLY
            storage_type: U16
            value_type:
              enum_ref:
                type_id: dess_strategy
            mapping: { space: HOLDING_REGISTER, offset: 5406, length_words: 1 }

          - point_id: dess_target_soc
            name: Dynamic ESS Target SOC
            description: Target state of charge for the current time slot (address 5407)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: "%"
            mapping: { space: HOLDING_REGISTER, offset: 5407, length_words: 1 }
            measurand: { base_quantity: state_of_charge }
