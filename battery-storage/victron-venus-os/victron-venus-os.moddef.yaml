# Source: Victron CCGX / Venus OS Modbus-TCP register list
# https://www.victronenergy.com/upload/documents/CCGX-Modbus-TCP-register-list-3.73.xlsx
# Register map confirmed against the vendor document above; not yet hardware-verified.
# Part of the ModDef blessed device registry.
#
# BESS-VIA-GATEWAY pattern
# ------------------------
# A Venus OS GX device is a Modbus-TCP gateway that exposes several dbus
# services, each addressed by a *distinct Modbus unit id*. The vendor sheet
# lists, among others:
#   com.victronenergy.system  -> unit id 100  (aggregated system view)
#   com.victronenergy.battery -> unit id == battery /DeviceInstance (e.g. 225)
#   com.victronenergy.vebus   -> unit id 246  (MultiPlus-II / Quattro)
#   com.victronenergy.grid    -> unit id == grid-meter /DeviceInstance
# Since Venus 2.60 unit ids are assigned dynamically and equal the dbus
# /DeviceInstance (Settings -> Integrations -> Modbus TCP server -> Available
# services lists the live values). This profile models the SYSTEM service at the
# default unit id 100, which already aggregates battery, grid and PV measurands.
# The per-service register pages (.battery 256-330, .vebus 3-57, .grid 2600-2648)
# would each be authored as their own device profile keyed on their own unit id.
#
# Address convention
# ------------------
# The "Address" column in the vendor sheet is the raw, already-0-based Modbus
# register number (e.g. Address 840 == register 840). All registers are read as
# holding registers, so ModDef offset = Address as-is (space HOLDING_REGISTER).
# The vendor "Scalefactor" column is a DIVISOR: engineering value = raw / factor
# (e.g. factor 10 -> transform scale 1/10). Factor 1 means no scaling.

doc_id: victron.venus-os
name: Victron Energy Venus OS GX (System Service)
version: 1.1.0

imports:
  - uri: moddef:stdlib:measurands:1.0.0

enums:
  - name: Active Input Source
    type_id: active_input_source
    values:
      - name: UNKNOWN
        value: 0
      - name: GRID
        value: 1
      - name: GENERATOR
        value: 2
      - name: SHORE_POWER
        value: 3
      - name: NOT_CONNECTED
        value: 240
  - name: Battery State
    type_id: battery_state
    values:
      - name: IDLE
        value: 0
      - name: CHARGING
        value: 1
      - name: DISCHARGING
        value: 2

  - name: Dynamic ESS Error
    type_id: dess_error
    values:
      - name: NO_ERROR
        value: 0
      - name: NO_ESS
        value: 1
      - name: ESS_MODE
        value: 2
      - name: NO_MATCHING_SCHEDULE
        value: 3
      - name: SOC_LOW
        value: 4
      - name: BATTERY_CAPACITY_NOT_CONFIGURED
        value: 5
  - name: Dynamic ESS Restrictions
    type_id: dess_restrictions
    values:
      - name: NO_RESTRICTIONS
        value: 0
      - name: GRID_TO_BATTERY_RESTRICTED
        value: 1
      - name: BATTERY_TO_GRID_RESTRICTED
        value: 2
      - name: NO_FLOW_BETWEEN_BATTERY_AND_GRID
        value: 3
  - name: Dynamic ESS Strategy
    type_id: dess_strategy
    values:
      - name: TARGET_SOC
        value: 0
      - name: SELF_CONSUMPTION
        value: 1
      - name: PRO_BATTERY
        value: 2
      - name: PRO_GRID
        value: 3

devices:
  - device_id: victron-venus-os
    vendor: Victron Energy
    model: Venus OS GX (MultiPlus-II / Quattro system)
    supported_transports:
      - MODBUS_TCP
    default_unit_id: 100
    blocks:
      # com.victronenergy.system service (Modbus unit id 100). Registers are
      # sparse in the vendor sheet (808..860); a single block with explicit
      # per-point offsets covers the curated subset without overlap.
      - block_id: system
        name: System Aggregated Values
        space: HOLDING_REGISTER
        start_offset: 800
        length_words: 120
        points:
          - point_id: pv_ac_output_l1_power
            name: PV AC-coupled on output L1
            description: AC-coupled PV inverter power on inverter output, phase L1
            access: READ_ONLY
            storage_type: U16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 808
              length_words: 1
            measurand:
              base_quantity: pv_power
              phase_ref: L1
              location: OUTLET
            unit: W

          - point_id: grid_l1_power
            name: Grid L1 Power
            description: Power exchanged with the grid on phase L1 (positive = import, negative = export)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 820
              length_words: 1
            measurand:
              base_quantity: active_power
              phase_ref: L1
              direction: NET
              location: GRID
            unit: W

          - point_id: grid_l2_power
            name: Grid L2 Power
            description: Power exchanged with the grid on phase L2 (positive = import, negative = export)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 821
              length_words: 1
            measurand:
              base_quantity: active_power
              phase_ref: L2
              direction: NET
              location: GRID
            unit: W

          - point_id: grid_l3_power
            name: Grid L3 Power
            description: Power exchanged with the grid on phase L3 (positive = import, negative = export)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 822
              length_words: 1
            measurand:
              base_quantity: active_power
              phase_ref: L3
              direction: NET
              location: GRID
            unit: W

          - point_id: active_input_source
            name: Active Input Source
            description: Source feeding the active AC input (grid, generator, shore or none)
            access: READ_ONLY
            storage_type: S16
            value_type:
              enum_ref:
                type_id: active_input_source
            mapping:
              space: HOLDING_REGISTER
              offset: 826
              length_words: 1

          - point_id: battery_voltage
            name: Battery Voltage (System)
            description: System DC battery terminal voltage
            access: READ_ONLY
            storage_type: U16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 840
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 10
            measurand:
              base_quantity: battery_voltage
              location: BATTERY
            unit: V

          - point_id: battery_current
            name: Battery Current (System)
            description: System DC battery current (positive = charging, negative = discharging)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 841
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 10
            measurand:
              base_quantity: battery_current
              direction: CHARGE
              location: BATTERY
            unit: A

          - point_id: battery_power
            name: Battery Power (System)
            description: System DC battery power (positive = charging, negative = discharging)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 842
              length_words: 1
            measurand:
              base_quantity: battery_power
              direction: CHARGE
              location: BATTERY
            unit: W

          - point_id: battery_soc
            name: Battery State of Charge (System)
            description: System battery state of charge
            access: READ_ONLY
            storage_type: U16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 843
              length_words: 1
            measurand:
              base_quantity: state_of_charge
              location: BATTERY
            unit: "%"

          - point_id: battery_state
            name: Battery State (System)
            description: System battery operating state (idle, charging or discharging)
            access: READ_ONLY
            storage_type: U16
            value_type:
              enum_ref:
                type_id: battery_state
            mapping:
              space: HOLDING_REGISTER
              offset: 844
              length_words: 1

          - point_id: pv_dc_power
            name: PV DC-coupled Power
            description: Total power from DC-coupled solar chargers (MPPTs)
            access: READ_ONLY
            storage_type: U16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 850
              length_words: 1
            measurand:
              base_quantity: pv_power
              location: PV
            unit: W

          - point_id: pv_dc_current
            name: PV DC-coupled Current
            description: Total current from DC-coupled solar chargers (MPPTs)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 851
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 10
            measurand:
              base_quantity: pv_current
              location: PV
            unit: A

          - point_id: charger_power
            name: Charger Power
            description: DC power delivered by DC chargers on the system DC bus
            access: READ_ONLY
            storage_type: U16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 855
              length_words: 1
            measurand:
              base_quantity: active_power
              location: BATTERY
            unit: W

          - point_id: dc_system_power
            name: DC System Power
            description: Net DC system load power not otherwise accounted for (signed)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 860
              length_words: 1
            measurand:
              base_quantity: active_power
              direction: NET
              location: LOAD
            unit: W

          - point_id: serial_number
            name: Serial (System)
            description: GX device serial - MAC address of the GX, 12 characters (address 800, string[6])
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              offset: 800
              length_words: 6
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: FIXED_LENGTH }

          - point_id: relay_1_state
            name: GX Relay 1 State
            description: GX relay 1 state, writable (address 806; 0 open, 1 closed)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 806, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]

          - point_id: relay_2_state
            name: GX Relay 2 State
            description: GX relay 2 state, writable; available on Venus GX only (address 807; 0 open, 1 closed)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 807, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]

          - point_id: pv_ac_output_l2_power
            name: PV AC-coupled on output L2
            description: AC-coupled PV inverter power on inverter output, phase L2 (address 809)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 809, length_words: 1 }
            unit: W
            measurand: { base_quantity: pv_power, phase_ref: L2, location: OUTLET }

          - point_id: pv_ac_output_l3_power
            name: PV AC-coupled on output L3
            description: AC-coupled PV inverter power on inverter output, phase L3 (address 810)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 810, length_words: 1 }
            unit: W
            measurand: { base_quantity: pv_power, phase_ref: L3, location: OUTLET }

          - point_id: pv_ac_input_l1_power
            name: PV AC-coupled on input L1
            description: AC-coupled PV inverter power on the AC input, phase L1 (address 811)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 811, length_words: 1 }
            unit: W
            measurand: { base_quantity: pv_power, phase_ref: L1, location: GRID }

          - point_id: pv_ac_input_l2_power
            name: PV AC-coupled on input L2
            description: AC-coupled PV inverter power on the AC input, phase L2 (address 812)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 812, length_words: 1 }
            unit: W
            measurand: { base_quantity: pv_power, phase_ref: L2, location: GRID }

          - point_id: pv_ac_input_l3_power
            name: PV AC-coupled on input L3
            description: AC-coupled PV inverter power on the AC input, phase L3 (address 813)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 813, length_words: 1 }
            unit: W
            measurand: { base_quantity: pv_power, phase_ref: L3, location: GRID }

          - point_id: pv_ac_genset_l1_power
            name: PV AC-coupled on generator L1
            description: AC-coupled PV inverter power on the generator input, phase L1 (address 814)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 814, length_words: 1 }
            unit: W
            measurand: { base_quantity: pv_power, phase_ref: L1 }

          - point_id: pv_ac_genset_l2_power
            name: PV AC-coupled on generator L2
            description: AC-coupled PV inverter power on the generator input, phase L2 (address 815)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 815, length_words: 1 }
            unit: W
            measurand: { base_quantity: pv_power, phase_ref: L2 }

          - point_id: pv_ac_genset_l3_power
            name: PV AC-coupled on generator L3
            description: AC-coupled PV inverter power on the generator input, phase L3 (address 816)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 816, length_words: 1 }
            unit: W
            measurand: { base_quantity: pv_power, phase_ref: L3 }

          - point_id: ac_consumption_l1
            name: AC Consumption L1
            description: Power supplied by the system to loads, phase L1 (address 817)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 817, length_words: 1 }
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L1, location: LOAD }

          - point_id: ac_consumption_l2
            name: AC Consumption L2
            description: Power supplied by the system to loads, phase L2 (address 818)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 818, length_words: 1 }
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L2, location: LOAD }

          - point_id: ac_consumption_l3
            name: AC Consumption L3
            description: Power supplied by the system to loads, phase L3 (address 819)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 819, length_words: 1 }
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L3, location: LOAD }

          - point_id: genset_l1_power
            name: Genset L1 Power
            description: Power supplied by the generator to the system, phase L1 (address 823)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 823, length_words: 1 }
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L1 }

          - point_id: genset_l2_power
            name: Genset L2 Power
            description: Power supplied by the generator to the system, phase L2 (address 824)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 824, length_words: 1 }
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L2 }

          - point_id: genset_l3_power
            name: Genset L3 Power
            description: Power supplied by the generator to the system, phase L3 (address 825)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 825, length_words: 1 }
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L3 }

          - point_id: system_time_utc
            name: System Time UTC
            description: GX system time as UTC epoch seconds (address 830, uint64)
            access: READ_ONLY
            storage_type: U64
            value_type: { primitive: DATETIME }
            datetime: { encoding: EPOCH_S, width: U64 }
            mapping:
              space: HOLDING_REGISTER
              offset: 830
              length_words: 4
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN

          - point_id: gx_firmware_major
            name: GX Firmware Major Version
            description: GX firmware major version; render in hexadecimal for the text version (address 834)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 834, length_words: 1 }

          - point_id: gx_firmware_beta
            name: GX Firmware Beta Release
            description: GX firmware beta release number; zero for official releases (address 835)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 835, length_words: 1 }

          - point_id: battery_consumed_ah
            name: Battery Consumed Amphours (System)
            description: Consumed amp-hours; vendor scale factor -10, value = raw / -10 (address 845)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 845, length_words: 1 }
            transform: { scale: { numerator: -1, denominator: 10 } }

          - point_id: battery_time_to_go
            name: Battery Time to Go (System)
            description: Estimated time to empty in seconds; 0 means charging (address 846, vendor scale 0.01)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 846, length_words: 1 }
            transform: { scale: { numerator: 100, denominator: 1 } }
            unit: s

          - point_id: vebus_charge_current
            name: VE.Bus Charge Current (System)
            description: Current flowing from the Multi to the DC system; negative is the other way (address 865)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 865, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: A
            measurand: { base_quantity: battery_current, direction: CHARGE }

          - point_id: vebus_charge_power
            name: VE.Bus Charge Power (System)
            description: Power flowing from the Multi to the DC system; negative is the other way (address 866)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 866, length_words: 1 }
            unit: W
            measurand: { base_quantity: battery_power, direction: CHARGE }

          - point_id: inverter_charger_current
            name: Inverter/Charger Current
            description: Inverter/charger DC current, 32-bit (address 868, int32)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 868
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: A
            measurand: { base_quantity: battery_current }

          - point_id: inverter_charger_power
            name: Inverter/Charger Power
            description: Inverter/charger DC power, 32-bit (address 870, int32)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 870
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            unit: W
            measurand: { base_quantity: battery_power }

          - point_id: consumption_on_input_l1
            name: Consumption on Input L1
            description: Power between meter and inverter/charger, phase L1; the Loads box on the overview (address 872, int32)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 872
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L1, location: LOAD }

          - point_id: consumption_on_input_l2
            name: Consumption on Input L2
            description: Power between meter and inverter/charger, phase L2; the Loads box on the overview (address 874, int32)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 874
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L2, location: LOAD }

          - point_id: consumption_on_input_l3
            name: Consumption on Input L3
            description: Power between meter and inverter/charger, phase L3; the Loads box on the overview (address 876, int32)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 876
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L3, location: LOAD }

          - point_id: consumption_on_output_l1
            name: Consumption on Output L1
            description: Power on output of inverter/charger, phase L1 (address 878, int32)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 878
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L1, location: LOAD }

          - point_id: consumption_on_output_l2
            name: Consumption on Output L2
            description: Power on output of inverter/charger, phase L2 (address 880, int32)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 880
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L2, location: LOAD }

          - point_id: consumption_on_output_l3
            name: Consumption on Output L3
            description: Power on output of inverter/charger, phase L3 (address 882, int32)
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 882
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L3, location: LOAD }

          - point_id: pv_ac_output_l1_power32
            name: PV AC-coupled on output L1 (32-bit)
            description: 32-bit variant of the pv ac-coupled on output L1 power register (address 884, uint32)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping:
              space: HOLDING_REGISTER
              offset: 884
              length_words: 2
              byte_order: BIG_ENDIAN
