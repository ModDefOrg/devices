      - block_id: energy_totals
        name: Total Energy Accumulators
        space: HOLDING_REGISTER
        start_offset: 20480 # 0x5000
        length_words: 56
        points:
          - point_id: active_energy_import
            name: Active Energy Import
            description: Cumulative imported active energy (manual 0x5000, U64, 0.01 kWh).
            access: READ_ONLY
            storage_type: U64
            value_type: { primitive: DECIMAL }
            unit: kWh
            mapping:
              space: HOLDING_REGISTER
              offset: 20480 # 0x5000
              length_words: 4
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            transform: { scale: { numerator: 1, denominator: 100 } }
            measurand:
              base_quantity: energy_active
              direction: IMPORT
              accumulation: REGISTER
