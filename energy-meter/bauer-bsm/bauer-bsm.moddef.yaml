            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 40235, length_words: 8, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }

          - point_id: meter_address_2
            name: Meter Address 2
            description: Meter address line 2
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 40243, length_words: 8, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }

          - point_id: real_energy_since_turn_on_sf
            name: Real Energy Since Turn-On Scale Factor
            description: sunssf scale factor for real energy imported since last turn-on
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, offset: 40253, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: real_energy_since_turn_on
            name: Real Energy Imported Since Turn-On
            description: Imported real energy since the last turn-on sequence (RCR)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 40251, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            transform: { scale_ref: { point_id: real_energy_since_turn_on_sf, mode: POW10 } }
            unit: Wh
            measurand: { base_quantity: energy_active, direction: IMPORT, accumulation: SESSION }

          - point_id: power_down_counter
            name: Power Down Counter
            description: Number of power-down events
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 40254, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }

          - point_id: response_counter
            name: Response Counter
            description: Number of snapshots signed by this device so far
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 40256, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }

          - point_id: operation_seconds
            name: Operation-Seconds Counter
            description: Operating seconds of this device
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 40258, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: s

          - point_id: epoch_time
            name: Current Epoch Time
            description: Unix epoch time, seconds since 1970-01-01 00:00
            access: READ_WRITE
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 40260, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: s
            write:
              behavior: DIRECT

          - point_id: timezone_offset
            name: Timezone Offset
            description: Timezone offset from UTC
            access: READ_WRITE
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, offset: 40262, length_words: 1, byte_order: BIG_ENDIAN }
            unit: min
            write:
              behavior: DIRECT

          - point_id: digital_input_state
            name: Digital Input State
            description: Digital input state; least-significant bit holds the input state
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 40267, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: digital_output_state
            name: Digital Output State
            description: Digital output state; writing the least-significant bit switches the output
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 40268, length_words: 1, byte_order: BIG_ENDIAN }
            write:
              behavior: DIRECT

          # Operator metadata written before creating a signed snapshot
          # (manual: Meta1/Meta2/Meta3, model 64900). Meta1 conventionally
          # carries the charge-point identification the OCMF dataset embeds.
          - point_id: meta1
            name: Metadata 1
            description: Snapshot metadata string 1 (charge-point identification), written before a snapshot
            access: READ_WRITE
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 40279, length_words: 70, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }
            write:
              behavior: DIRECT

          - point_id: meta2
            name: Metadata 2
            description: Snapshot metadata string 2, written before a snapshot
            access: READ_WRITE
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 40349, length_words: 50, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }
            write:
              behavior: DIRECT

          - point_id: meta3
            name: Metadata 3
            description: Snapshot metadata string 3, written before a snapshot
            access: READ_WRITE
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 40399, length_words: 50, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }
            write:
              behavior: DIRECT

      # --- Signed turn-on snapshot (model 64902): status register ---------
      - block_id: snapshot_start
        name: Signed Turn-On Snapshot (status)
        space: HOLDING_REGISTER
        start_offset: 41286
        length_words: 1
        points:
          - point_id: snapshot_status_start
            name: Turn-On Snapshot Status
            description: Write 2 (UPDATING) to create+sign the turn-on snapshot; poll until VALID (0) or an error code
            access: READ_WRITE
            storage_type: U16
            value_type: { enum_ref: { type_id: snapshot_status } }
            mapping: { space: HOLDING_REGISTER, offset: 41286, length_words: 1, byte_order: BIG_ENDIAN }
            write:
              behavior: COMMAND_TRIGGER

      # --- Signed turn-off snapshot (model 64903): status register --------
      - block_id: snapshot_end
        name: Signed Turn-Off Snapshot (status)
        space: HOLDING_REGISTER
        start_offset: 41540
        length_words: 1
        points:
          - point_id: snapshot_status_end
            name: Turn-Off Snapshot Status
            description: Write 2 (UPDATING) to create+sign the turn-off snapshot; poll until VALID (0) or an error code
            access: READ_WRITE
            storage_type: U16
            value_type: { enum_ref: { type_id: snapshot_status } }
            mapping: { space: HOLDING_REGISTER, offset: 41540, length_words: 1, byte_order: BIG_ENDIAN }
            write:
              behavior: COMMAND_TRIGGER

      # --- OCMF turn-on/turn-off snapshot representations ------------------
      # The model's ID sub-word at +0 is not independently useful; the
      # string is addressed directly (+4 from the model base).
      - block_id: ocmf_start
        name: OCMF Turn-On Snapshot (string)
        space: HOLDING_REGISTER
        start_offset: 43295
        length_words: 496
        points:
          - point_id: ocmf_start
            name: OCMF Turn-On Snapshot
            description: OCMF representation of the signed turn-on snapshot (JSON payload + signature)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 43295, length_words: 496, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }

      - block_id: ocmf_end
        name: OCMF Turn-Off Snapshot (string)
        space: HOLDING_REGISTER
        start_offset: 43795
        length_words: 496
        points:
          - point_id: ocmf_end
            name: OCMF Turn-Off Snapshot
            description: OCMF representation of the signed turn-off snapshot (JSON payload + signature)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 43795, length_words: 496, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }

    # --- Signed transaction procedures (spec §11.7) ------------------------
    # The manual's OCMF flow: write the operator metadata, write 2 ("update")
    # to the snapshot status register, poll it until VALID (0), then read the
    # OCMF string. Params re-declare the meta1-3 register windows as caller
    # inputs; step order is wire order.
    commands:
      - command_id: start_transaction
        name: Start Transaction
        command_ref: ocmf:start_transaction
        description: Create and sign the turn-on (billing start) snapshot and fetch its OCMF representation
        params:
          - field: meta1
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 40279, length_words: 70, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }
            required: true
          - field: meta2
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 40349, length_words: 50, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }
          - field: meta3
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: HOLDING_REGISTER, offset: 40399, length_words: 50, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }
        steps:
          - name: write_meta1
            write: { param: meta1 }
          - name: write_meta2
            write: { param: meta2 }
          - name: write_meta3
            write: { param: meta3 }
          - name: arm
            write: { trigger: { point_id: snapshot_status_start, value: 2 } }
          - name: wait_valid
            poll:
              point_id: snapshot_status_start
              until: { op: EQ, value: 0 }
              interval_ms: 500
              timeout_ms: 15000
          - name: fetch
            read: { point_id: ocmf_start, into: ocmf }
        results:
          - field: ocmf
            from: ocmf
            value_type: { primitive: STRING }

      - command_id: stop_transaction
        name: Stop Transaction
        command_ref: ocmf:stop_transaction
        description: Create and sign the turn-off (billing end) snapshot and fetch its OCMF representation (metadata persists from start_transaction)
        steps:
          - name: arm
            write: { trigger: { point_id: snapshot_status_end, value: 2 } }
          - name: wait_valid
            poll:
              point_id: snapshot_status_end
              until: { op: EQ, value: 0 }
              interval_ms: 500
              timeout_ms: 15000
          - name: fetch
            read: { point_id: ocmf_end, into: ocmf }
        results:
          - field: ocmf
            from: ocmf
            value_type: { primitive: STRING }
