      # Firmware version word (Modicon 300771, physical 0302h): a single register
      # packing major/minor in the high byte (bits 4..7 major, 0..3 minor) and the
      # patch number in the low byte.
      - block_id: info
        name: Device Information
        space: INPUT_REGISTER
        start_offset: 770
        length_words: 1
        points:
          - point_id: firmware_version
            name: Firmware Version
            description: Firmware major/minor/patch, packed (high byte = major.minor nibbles, low byte = patch)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 770, length_words: 1, byte_order: BIG_ENDIAN }
