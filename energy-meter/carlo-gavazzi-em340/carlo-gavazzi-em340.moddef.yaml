# Source: Carlo Gavazzi EMS Modbus Communication Protocol, Version 1.0 (Oct 2025),
# section 4 "Carlo Gavazzi Modbus map". The EM340 is the AV2 (direct connection,
# up to 65 A) main-meter hardware covered by that map (identification codes
# 2018d / 2034d); the EM340 datasheet (EM340 DS 280222) confirms the measured
# variables and the RS485 Modbus RTU interface. The register layout is common to
# the Carlo Gavazzi EM3xx/EM5xx family, so it matches the EM530 profile.
# Register map confirmed against the vendor document above; not yet hardware-verified.
# Part of the ModDef blessed device registry.
#
# Encoding notes (from the vendor protocol document):
#   - Measured variables live in the read-only register space, read with Modbus
#     function code 03 or 04 (used interchangeably per the doc). Physical (word)
#     addresses are given in hex and map directly to the ModDef offset:
#     0000h -> 0, 0034h -> 52, and so on.
#   - Numeric formats are scaled two's-complement integers. Within a word the
#     byte order is MSB->LSB (BIG_ENDIAN). For 32-bit values the word order is
#     LSW->MSW, i.e. the low word comes first (WORD_LITTLE_ENDIAN).
#   - Each variable carries a "value weight" (Volt*10, Ampere*1000, Watt*10,
#     ...). The transform.scale reverses it, so decoded values are in canonical
#     units (V, A, W, var, VA, Hz, kWh, kvarh, kVAh, %).
#   - Power factor sign follows the IEC convention (negative when the active
#     power is exported); the separate L/C-convention PF registers (0072h-0075h)
#     and EMS-gateway-only registers (digital I/O, tariff, output command) are
#     out of scope for the standalone meter.
#   - Coverage: the section 4.1 three-phase instantaneous variables, the energy
#     counters (total, partial, per-phase, import/export), run-hour meters, THD,
#     and the firmware version word.

doc_id: carlogavazzi.em340
name: Carlo Gavazzi EM340 Three-Phase Energy Meter
version: 1.0.0

imports:
  - uri: moddef:stdlib:measurands:1.0.0

devices:
  - device_id: carlo-gavazzi-em340
    vendor: Carlo Gavazzi
    model: EM340
    supported_transports:
      - MODBUS_RTU
    blocks:
      - block_id: measurements
        name: Measured Variables (read with FC03/FC04)
        space: INPUT_REGISTER
        length_words: 154
        points:
          - point_id: voltage_l1_n
            name: Voltage L1-N
            description: Phase 1 line-to-neutral RMS voltage
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_LITTLE_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L1_N }

          - point_id: voltage_l2_n
            name: Voltage L2-N
            description: Phase 2 line-to-neutral RMS voltage
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 2, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_LITTLE_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L2_N }

          - point_id: voltage_l3_n
