            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L2 }

          - point_id: active_power_l3
            name: Active Power L3
            description: Phase 3 active power
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 22, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_LITTLE_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10 } }
            unit: W
            measurand: { base_quantity: active_power, phase_ref: L3 }

          - point_id: apparent_power_l1
            name: Apparent Power L1
