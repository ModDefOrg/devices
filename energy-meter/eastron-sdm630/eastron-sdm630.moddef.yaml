      # -----------------------------------------------------------------
      # Configuration (Holding Registers, FC03 read / FC16 write). Settings
      # are float-encoded like the measurements. Registers marked r/wp in the
      # doc require the password (40025) to be written first.
      # -----------------------------------------------------------------
      - block_id: settings
        name: Meter Configuration (Holding Registers)
        space: HOLDING_REGISTER
        start_offset: 2
        length_words: 86
        points:
          - point_id: demand_period
            name: Demand Period
            description: Demand integration period in minutes; 0 makes demand track the instantaneous value (40003)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 2
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 5, 8, 10, 15, 20, 30, 60]

          - point_id: system_type
            name: System Type
            description: Wiring system type - 1 = 1p2w, 2 = 3p3w, 3 = 3p4w; password protected (40011)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 10
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [1, 2, 3]

          - point_id: pulse1_width
            name: Pulse 1 Width
            description: Pulse output 1 on-period in milliseconds (40013)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 12
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [60, 100, 200]

          - point_id: password_lock
            name: Password Lock
            description: Read password lock status - 0 locked, 1 unlocked; reading resets the password timeout; writing any value re-locks (40015)
            access: READ_ONLY
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 14
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN

          - point_id: network_parity_stop
            name: Network Parity/Stop
            description: Network port parity and stop bits - 0 = 1 stop no parity, 1 = even, 2 = odd, 3 = 2 stop no parity; restart required (40019)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 18
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1, 2, 3]

          - point_id: network_node
            name: Network Node Address
            description: Modbus node address 1-247; restart required (40021)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 20
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 1, denominator: 1 }
                max_value: { numerator: 247, denominator: 1 }

          - point_id: pulse1_divisor
            name: Pulse 1 Divisor
            description: Pulse divisor index 0-5 - 0.0025/0.01/0.1/1/10/100 kWh per pulse (40023)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 22
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1, 2, 3, 4, 5]

          - point_id: password
            name: Password
            description: Password for access to protected registers (40025)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 24
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT

          - point_id: network_baud_rate
            name: Network Baud Rate
            description: Network baud rate index - 0 = 2400, 1 = 4800, 2 = 9600, 3 = 19200, 4 = 38400 (40029)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 28
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1, 2, 3, 4]

          - point_id: pulse1_energy_type
            name: Pulse 1 Energy Type
            description: Energy quantity assigned to pulse output 1 - 1 import active, 2 total active, 4 export active, 5 import reactive, 6 total reactive, 8 export reactive (40087)
            access: READ_WRITE
            storage_type: IEEE754_F32
            value_type: { primitive: FLOAT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 86
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [1, 2, 4, 5, 6, 8]


      # -----------------------------------------------------------------
      # Demand reset command (documented address 461457 -> offset 61456,
      # write-only, 2-byte hex payload 0x0000) and read-only serial number
      # (documented address 464513 -> offset 64512, unsigned int32).
      # -----------------------------------------------------------------
      - block_id: commands
        name: Commands
        space: HOLDING_REGISTER
        start_offset: 61456
        length_words: 1
        points:
          - point_id: demand_reset
            name: Reset Maximum Demand
            description: Write 0x0000 to reset the maximum demand registers (461457)
            access: COMMAND
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 61456, length_words: 1 }
            write:
              behavior: COMMAND_TRIGGER
              constraints:
                allowed_values: [0]

      - block_id: identity
        name: Device Identity
        space: HOLDING_REGISTER
        start_offset: 64512
        length_words: 2
        points:
          - point_id: serial_number
            name: Serial Number
            description: Device serial number, unsigned 32-bit, read-only (464513)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 64512
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
