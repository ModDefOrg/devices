# Source: Eastron SDM630 Modbus Protocol V1.x
# https://www.eastroneurope.com/images/uploads/products/protocol/SDM630_MODBUS_Protocol.pdf
# Register map confirmed against the vendor document above; not yet hardware-verified.
# Part of the ModDef blessed device registry.
#
# Encoding notes (from the vendor protocol document):
#   - All measured values are 32-bit IEEE-754 floating point, occupying two
#     consecutive registers (length_words: 2). Values are pre-scaled in
#     engineering units, so no transform.scale is applied.
#   - Measured/calculated values live in the Input Register space and are read
#     with Modbus function code 04 (FC04 -> INPUT_REGISTER).
#   - Default register order is "normal": most-significant register first,
#     which maps to byte_order BIG_ENDIAN + word_order WORD_BIG_ENDIAN.
#   - Address convention: documented 3xxxx/4xxxx registers are 1-based; the
#     ModDef 0-based offset = (documented address) - 30001 / - 40001.
#     e.g. 30001 -> offset 0, 30073 -> offset 72, 40003 -> offset 2.
#   - Holding-register settings are also float-encoded per the doc; several
#     require the password (40025) to be set first (r/wp mode).
#   - Coverage: all documented input parameters (voltages, currents, powers,
#     phase angles, THD, demand, per-phase energies) and all documented
#     holding-register settings, the demand reset command and the serial
#     number register.

