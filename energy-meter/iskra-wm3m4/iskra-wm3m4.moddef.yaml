              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: VA
            measurand: { base_quantity: apparent_power, phase_ref: L1 }

          - point_id: apparent_power_l2
            name: Apparent Power L2
            description: Phase 2 apparent power (T5), multi-phase modes only
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 160
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: VA
            measurand: { base_quantity: apparent_power, phase_ref: L2 }

          - point_id: apparent_power_l3
            name: Apparent Power L3
            description: Phase 3 apparent power (T5), multi-phase modes only
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 162
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: VA
            measurand: { base_quantity: apparent_power, phase_ref: L3 }

          # T7 power factor pairs: [flags word][magnitude word]. The magnitude
          # is the second register (4 decimal places); the flags word carries
          # the import/export and inductive/capacitive signs (00/FF bytes).
          - point_id: power_factor_total_signs
            name: Power Factor Total Signs
            description: PFt sign flags — import/export (high byte) and inductive/capacitive (low byte), 00/FF
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 164, length_words: 1, byte_order: BIG_ENDIAN }
            fields:
              - field_id: import_export
                name: Import/Export Sign
                bit_offset: 8
                bit_length: 8
                value_type: { primitive: UINT32 }
              - field_id: inductive_capacitive
                name: Inductive/Capacitive Sign
                bit_offset: 0
                bit_length: 8
                value_type: { primitive: UINT32 }

          - point_id: power_factor_total
            name: Power Factor Total
            description: Total power factor magnitude PFt (T7 low word, 4 decimals)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 165, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10000 } }
            unit: "1"
            measurand: { base_quantity: power_factor, aggregation: TOTAL }

          - point_id: power_factor_l1_signs
            name: Power Factor L1 Signs
            description: PF1 sign flags — import/export (high byte) and inductive/capacitive (low byte), 00/FF
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 166, length_words: 1, byte_order: BIG_ENDIAN }
            fields:
              - field_id: import_export
                name: Import/Export Sign
                bit_offset: 8
                bit_length: 8
                value_type: { primitive: UINT32 }
              - field_id: inductive_capacitive
                name: Inductive/Capacitive Sign
                bit_offset: 0
                bit_length: 8
                value_type: { primitive: UINT32 }

          - point_id: power_factor_l1
            name: Power Factor L1
            description: Phase 1 power factor magnitude (T7 low word, 4 decimals), multi-phase modes only
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 167, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10000 } }
            unit: "1"
            measurand: { base_quantity: power_factor, phase_ref: L1 }

          - point_id: power_factor_l2_signs
            name: Power Factor L2 Signs
            description: PF2 sign flags — import/export (high byte) and inductive/capacitive (low byte), 00/FF
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 168, length_words: 1, byte_order: BIG_ENDIAN }
            fields:
              - field_id: import_export
                name: Import/Export Sign
                bit_offset: 8
                bit_length: 8
                value_type: { primitive: UINT32 }
              - field_id: inductive_capacitive
                name: Inductive/Capacitive Sign
                bit_offset: 0
                bit_length: 8
                value_type: { primitive: UINT32 }

          - point_id: power_factor_l2
            name: Power Factor L2
            description: Phase 2 power factor magnitude (T7 low word, 4 decimals), multi-phase modes only
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 169, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10000 } }
            unit: "1"
            measurand: { base_quantity: power_factor, phase_ref: L2 }

          - point_id: power_factor_l3_signs
            name: Power Factor L3 Signs
            description: PF3 sign flags — import/export (high byte) and inductive/capacitive (low byte), 00/FF
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 170, length_words: 1, byte_order: BIG_ENDIAN }
            fields:
              - field_id: import_export
                name: Import/Export Sign
                bit_offset: 8
                bit_length: 8
                value_type: { primitive: UINT32 }
              - field_id: inductive_capacitive
                name: Inductive/Capacitive Sign
                bit_offset: 0
                bit_length: 8
                value_type: { primitive: UINT32 }

          - point_id: power_factor_l3
            name: Power Factor L3
            description: Phase 3 power factor magnitude (T7 low word, 4 decimals), multi-phase modes only
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 171, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 10000 } }
            unit: "1"
            measurand: { base_quantity: power_factor, phase_ref: L3 }

      # --- Non-reset energy totals (input registers, 30414..30425) --------
      # T3 mantissas (30418..30425) with pooled T2 decade exponents
      # (30414..30417): each total is a composed point whose parent window
      # spans both pools; sub-mapping offsets are window-relative (§14).
      - block_id: energy_totals
        name: Non-Reset Energy Totals (input registers)
        space: INPUT_REGISTER
        start_offset: 414
        length_words: 12
        points:
          - point_id: energy_counter_1
            name: Energy Counter 1 (Non-reset)
            description: Import active energy total (factory counter 1 assignment); mantissa 30418 x 10^exponent 30414
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 414
              length_words: 6
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                exponent: { offset: 0, length_words: 1, byte_order: BIG_ENDIAN, storage_type: S16 }
                mantissa: { offset: 4, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S32 }
            unit: Wh
            measurand: { base_quantity: energy_active, direction: IMPORT, accumulation: LIFETIME }

          - point_id: energy_counter_2
            name: Energy Counter 2 (Non-reset)
            description: Export active energy total (factory counter 2 assignment); mantissa 30420 x 10^exponent 30415
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 415
              length_words: 7
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                exponent: { offset: 0, length_words: 1, byte_order: BIG_ENDIAN, storage_type: S16 }
                mantissa: { offset: 5, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S32 }
            unit: Wh
            measurand: { base_quantity: energy_active, direction: EXPORT, accumulation: LIFETIME }

          - point_id: energy_counter_3
            name: Energy Counter 3 (Non-reset)
            description: Imported squared-current accumulation for cable-loss calculation (factory counter 3 assignment); quantity configurable via 40421+
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 416
              length_words: 8
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                exponent: { offset: 0, length_words: 1, byte_order: BIG_ENDIAN, storage_type: S16 }
                mantissa: { offset: 6, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S32 }

          - point_id: energy_counter_4
            name: Energy Counter 4 (Non-reset)
            description: Exported squared-current accumulation for cable-loss calculation (factory counter 4 assignment); quantity configurable via 40421+
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 417
              length_words: 9
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                exponent: { offset: 0, length_words: 1, byte_order: BIG_ENDIAN, storage_type: S16 }
                mantissa: { offset: 7, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S32 }

      # --- Power quality (input registers, 30181..30190) ------------------
      - block_id: power_quality
        name: Power Quality (input registers)
        space: INPUT_REGISTER
        start_offset: 181
        length_words: 10
        points:
          - point_id: internal_temperature
            name: Internal Temperature
            description: Meter internal temperature
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 181, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: degC
            measurand: { base_quantity: temperature, location: INTERNAL }

          - point_id: voltage_thd_l1
            name: Voltage THD L1
            description: Total harmonic distortion, voltage phase 1
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 182, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: "%"

          - point_id: voltage_thd_l2
            name: Voltage THD L2
            description: Total harmonic distortion, voltage phase 2
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 183, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: "%"

          - point_id: voltage_thd_l3
            name: Voltage THD L3
            description: Total harmonic distortion, voltage phase 3
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 184, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: "%"

          - point_id: current_thd_l1
            name: Current THD L1
            description: Total harmonic distortion, current phase 1
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 188, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: "%"

          - point_id: current_thd_l2
            name: Current THD L2
            description: Total harmonic distortion, current phase 2
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 189, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: "%"

          - point_id: current_thd_l3
            name: Current THD L3
            description: Total harmonic distortion, current phase 3
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 190, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }
            unit: "%"

      # --- EV charging-process billing block (holding registers) ----------
      # Exact per-session billing values; the lifetime totals live in the
      # energy_totals block above.
      - block_id: ev_charging
        name: EV Charging Process (holding registers)
        space: HOLDING_REGISTER
        start_offset: 6985
        length_words: 64
        points:
          - point_id: cable_loss_export
            name: Cable Loss (A-)
            description: Accumulated cable-loss energy in the export (A-) direction
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 6985, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: consumption_export_with_cable_loss
            name: Consumption (A-) + Cable Loss
            description: Export active energy including cable loss
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 6987, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh
            measurand: { base_quantity: energy_active, direction: EXPORT, accumulation: SESSION }

          - point_id: cable_loss_import
            name: Cable Loss (A+)
            description: Accumulated cable-loss energy in the import (A+) direction
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 6995, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: consumption_import_less_cable_loss
            name: Consumption (A+) - Cable Loss
            description: Import active energy with cable loss subtracted
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 6997, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh
            measurand: { base_quantity: energy_active, direction: IMPORT, accumulation: SESSION }

          - point_id: cable_resistance
            name: Cable Resistance During Charging
            description: Cable resistance used for loss compensation (reported in hundredths of a milliohm)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 6999, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100000 } }
            unit: Ohm

          - point_id: measurement_status
            name: Measurement Status
            description: Charging-process measurement state machine (0 = Idle)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7000, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: charging_duration
            name: Charging Duration
            description: Duration of the current charging process
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7001, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: s

          - point_id: consumption
            name: Consumption
            description: Import active energy consumed in the current charging process
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7003, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh
            measurand: { base_quantity: energy_active, direction: IMPORT, accumulation: SESSION }

          - point_id: tariff_changes_count
            name: Tariff Changes Count
            description: Number of tariff changes during the charging process
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7009, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: intermediate_readings_count
            name: Intermediate Readings Count
            description: Number of intermediate readings during the charging process
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7010, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: fiscal_readings_count
            name: Fiscal Readings Count
            description: Number of fiscal readings during the charging process
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7011, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }

          - point_id: signatures_count
            name: Signatures Count
            description: Number of digital signatures produced
            access: READ_ONLY
            storage_type: S32
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7013, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }

          - point_id: start_counter_import
            name: Start Counter Value (A+)
            description: Import energy register snapshot at charging start
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7017, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: stop_counter_import
            name: Stop Counter Value (A+)
            description: Import energy register snapshot at charging stop
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7021, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: tariff_change_counter_import
            name: Tariff Change Counter Value (A+)
            description: Import energy register snapshot at the last tariff change
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7025, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: intermediate_reading_counter_import
            name: Intermediate Reading Counter Value (A+)
            description: Import energy register snapshot at the last intermediate reading
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7029, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: fiscal_reading_counter_import
            name: Fiscal Reading Counter Value (A+)
            description: Import energy register snapshot at the last fiscal reading
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7033, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: hold_counter_import
            name: Hold Measurements Counter Value (A+)
            description: Import energy register snapshot at the last hold event
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7037, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: suspend_counter_import
            name: Suspend Counter Value (A+)
            description: Import energy register snapshot at the last suspend event
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7041, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: start_counter_export
            name: Start Counter 2 Value (A-)
            description: Export energy register snapshot at charging start
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7043, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: stop_counter_export
            name: Stop Counter 2 Value (A-)
            description: Export energy register snapshot at charging stop
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7045, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh

          - point_id: consumption_export
            name: Consumption 2 (A-)
            description: Export active energy in the current charging process
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 7047, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN }
            unit: Wh
            measurand: { base_quantity: energy_active, direction: EXPORT, accumulation: SESSION }
