            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 120
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L2_L3 }

          - point_id: voltage_l31
            name: Voltage L3-L1
            description: Line voltage between phases 3 and 1 (T5)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 122
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L3_L1 }

          - point_id: current_l1
            name: Current L1
            description: Phase 1 current (T5)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 126
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: A
            measurand: { base_quantity: current, phase_ref: L1 }

          - point_id: current_l2
            name: Current L2
            description: Phase 2 current (T5), multi-phase modes only
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 128
