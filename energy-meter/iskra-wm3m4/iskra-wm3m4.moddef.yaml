# Source: Iskra WM3M4 / WM3M4C User's Manual, Ver 2.13 (document 22433950).
# https://www.iskra.eu/f/docs/Smart-energy-meters/K_WM3M4_EN_22433950_Users_manual_Ver_2.13.pdf
# Register map confirmed against the vendor document above; not yet hardware-verified.
# Part of the ModDef blessed device registry.
#
# The WM3M4(C) is an MID / eichrecht three-phase energy meter used in EV charging
# (signed measurements, cable-loss compensation, per-charging-process counters).
#
# Encoding notes (from the vendor manual, appendix "Modbus tables"):
#   - Modbus RTU over RS485. Read-only measurement/counter data lives in the Input
#     Register range 3xxxx (FC 0x04); settings/commands/EV counters live in the
#     Holding Register range 4xxxx (FC 0x03 / 0x06 / 0x10). Addresses are 0-based
#     within each range, so the ModDef offset = address - 30000 (input) or
#     address - 40000 (holding). Big-endian, MSW first.
#   - Iskra data types: T1 = u16, T2 = s16, T3 = s32, T3u/T_32U = u32,
#     T16 = u16 with 2 decimals (value = raw/100), T17 = s16 with 2 decimals,
#     T_StrN = ASCII text (2 chars per register).
#   - T5/T6 measurements (spec §14.2 embedded decade exponent): one 32-bit word
#     holding a signed 8-bit decade exponent in bits 31..24 and a 24-bit
#     mantissa (unsigned for T5, signed for T6) in bits 23..0;
#     value = mantissa * 10^exponent. Vendor example: FD01 E240 = 123456*10^-3
#     = 123.456. Modeled as COMPOSED points with bit-windowed sub-mappings.
#   - T7 power factor: [flags word][magnitude word] — bits 31..24 import/export
#     sign (00/FF), bits 23..16 inductive/capacitive sign (00/FF), bits 15..0
#     unsigned magnitude with 4 decimal places. The two words fall on register
#     boundaries, so each PF is modeled as a scalar magnitude point (U16,
#     scale 1/10000) plus a sign-flags point with §13.1 sub-fields.
#   - Non-reset energy counters: T3 mantissa (30418..30425) with a separate T2
#     decade exponent (30414..30417), pooled in interleaved ranges. Each total
#     is a COMPOSED point whose parent window spans both pools (composed points
#     may overlap each other, spec §14). Factory counter assignment: 1 = import
#     active energy, 2 = export active energy, 3/4 = imported/exported squared-
#     current accumulation for cable-loss calculation (quantity configurable
#     via 40421+).
#   - Coverage: device identification, instantaneous measurements (frequency,
#     voltage, current, active/reactive/apparent power, power factor),
#     non-reset energy totals, power-quality metrics (internal temperature,
#     voltage/current THD), active tariff, and the EV charging-process billing
#     block (consumption, cable loss/resistance, and the start/stop/tariff/
#     intermediate/fiscal/hold/suspend counter snapshots), and the signed
#     billing transaction flow (manual SS6.4): the command/status/length/
#     message/signature/public-key registers as points, and the begin/end
#     procedure as the begin_transaction / end_transaction commands (spec
#     SS11.7, v0.5). The Output Message and Signature length registers are
#     BYTE counts, so they are returned to the caller to truncate with
#     rather than used as length_ref (which resolves to words) — see the
#     signature block comment.
#   - Per-phase points are valid only in multi-phase connection modes; the
#     phase_valid bitfield (30101) reports invalid phases.

doc_id: iskra.wm3m4
name: Iskra WM3M4 Three-Phase Energy Meter
version: 1.0.0

imports:
  - uri: moddef:stdlib:measurands:1.0.0

enums:
  - type_id: signature_format
    name: Signature Format
    description: Encoding of the signature register 48188 (manual table, register 47059)
    values:
      - { value: 0, name: ASN_1, description: Hex-encoded ASN.1 DER }
      - { value: 1, name: BASE64, description: Base64 encoding }

devices:
  - device_id: iskra-wm3m4
    vendor: Iskra
    model: WM3M4
    supported_transports:
      - MODBUS_RTU
    blocks:
      # --- Identification (input registers, 30000..30081) -----------------
      - block_id: identification
        name: Device Identification (input registers)
        space: INPUT_REGISTER
        start_offset: 0
        length_words: 82
        points:
          - point_id: device_group
            name: Device Group
            description: Device group code (4 = WM family)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 0, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: model_number
            name: Model Number
            description: Model designation (e.g. WM3M4C), ASCII
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: INPUT_REGISTER, offset: 1, length_words: 8, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }

          - point_id: serial_number
            name: Serial Number
            description: Meter serial number, ASCII
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: INPUT_REGISTER, offset: 9, length_words: 4, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }

          - point_id: software_reference
            name: Software Reference
            description: Firmware reference (100 = 1.00)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 13, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: hardware_reference
            name: Hardware Reference
            description: Hardware revision letter, ASCII
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping: { space: INPUT_REGISTER, offset: 14, length_words: 1, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED } }

          - point_id: accuracy_class
            name: Accuracy Class
            description: Meter accuracy class (100 = class 1.0)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: INPUT_REGISTER, offset: 19, length_words: 1, byte_order: BIG_ENDIAN }
            transform: { scale: { numerator: 1, denominator: 100 } }

          - point_id: com1_type
            name: COM1 Communication Type
            description: COM1 physical layer (2 = RS485)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 24, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: mid_lock_status
            name: MID Lock Status
            description: Metrological lock status (0 unlocked, non-zero locked)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 76, length_words: 1, byte_order: BIG_ENDIAN }

      # --- Status & tariff (input registers) ------------------------------
      - block_id: status
        name: Status & Tariff (input registers)
        space: INPUT_REGISTER
        start_offset: 101
        length_words: 305
        points:
          - point_id: phase_valid
            name: Phase Valid Measurement
            description: Per-phase measurement validity bitfield (bit 0 = phase 1 invalid, ...)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 101, length_words: 1, byte_order: BIG_ENDIAN }

          - point_id: current_active_tariff
            name: Current Active Tariff
            description: Currently active tariff number
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 405, length_words: 1, byte_order: BIG_ENDIAN }

      # --- Instantaneous measurements (input registers, 30105..30171) -----
      # T5/T6: embedded decade exponent (§14.2) — 24-bit mantissa + signed
      # 8-bit exponent in one 32-bit word. T7 (power factor): flags word +
      # magnitude word, split into two register-aligned points.
      - block_id: instantaneous
        name: Instantaneous Measurements (input registers)
        space: INPUT_REGISTER
        start_offset: 105
        length_words: 67
        points:
          - point_id: frequency
            name: Frequency
            description: Grid frequency (T5)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 105
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: Hz
            measurand: { base_quantity: frequency }

          - point_id: voltage_l1
            name: Voltage L1-N
            description: Phase 1 to neutral voltage (T5)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 107
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L1_N }

          - point_id: voltage_l2
            name: Voltage L2-N
            description: Phase 2 to neutral voltage (T5), multi-phase modes only
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 109
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L2_N }

          - point_id: voltage_l3
            name: Voltage L3-N
            description: Phase 3 to neutral voltage (T5), multi-phase modes only
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 111
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L3_N }

          - point_id: voltage_l12
            name: Voltage L1-L2
            description: Line voltage between phases 1 and 2 (T5)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 118
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L1_L2 }

          - point_id: voltage_l23
            name: Voltage L2-L3
            description: Line voltage between phases 2 and 3 (T5)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 120
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L2_L3 }

          - point_id: voltage_l31
            name: Voltage L3-L1
            description: Line voltage between phases 3 and 1 (T5)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 122
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L3_L1 }

          - point_id: current_l1
            name: Current L1
            description: Phase 1 current (T5)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 126
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              composed:
                kind: MANTISSA_EXPONENT
                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: A
            measurand: { base_quantity: current, phase_ref: L1 }

          - point_id: current_l2
            name: Current L2
            description: Phase 2 current (T5), multi-phase modes only
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
            mapping:
              space: INPUT_REGISTER
              offset: 128
