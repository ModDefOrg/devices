                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
