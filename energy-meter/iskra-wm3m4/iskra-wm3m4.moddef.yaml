                base: 10
                mantissa: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: U32, bit_offset: 0, bit_length: 24 }
                exponent: { offset: 0, length_words: 2, byte_order: BIG_ENDIAN, word_order: WORD_BIG_ENDIAN, storage_type: S16, bit_offset: 24, bit_length: 8 }
            unit: A
            measurand: { base_quantity: current, phase_ref: L3 }

          - point_id: active_power_total
            name: Active Power Total
            description: Total active power Pt (T6, signed)
            access: READ_ONLY
            storage_type: COMPOSED
            value_type: { primitive: DECIMAL }
