# Source: Daikin DCOM-LT/MB Modbus interface reference manual (Altherma LT)
# https://www.daikin.eu/ (DCOM-LT/MB reference manual)
# Register map confirmed against the vendor document above; not yet hardware-verified.
# Part of the ModDef blessed device registry.
#
# Gateway note: this profile describes the DCOM-LT/MB Modbus interface adaptor
# that sits in front of a Daikin Altherma LT air-to-water heat pump. The DCOM
# exposes Modbus RTU (9600 8N1) in slave mode with two register spaces:
# "Analog Holding" (read/write setpoints + modes) and "Analog Input"
# (read-only sensors + status). Special return values 32765/32766/32767 are
# sentinels for "wait for value" / "unavailable" / "unsupported".
#
# Address convention: the DCOM manual uses "Register Offset" numbering with
# "Register Base 0" -- offsets are ALREADY 0-based (the manual states
# DCOM Holding Register N = Modicon 40001 + N; DCOM Input Register N =
# Modicon 30001 + N). Therefore ModDef offset = documented DCOM Register Offset,
# as-is. Holding -> HOLDING_REGISTER, Input -> INPUT_REGISTER.
#
# Data types (manual "DATA TYPES" table):
#   temp16 = signed 16-bit, value / 100 -> degC  (range -327.68 .. 327.67)
#   int16  = signed 16-bit, no scaling
#   text16 = unsigned 16-bit, 2 ASCII chars (MSB, LSB)
#
# Coverage: all normal-mode holding and input registers of the DCOM-LT/MB.
# The "Sequencer Mode" tables (and the DCOM-LT/IO sequencer registers) remap
# the same offsets with different meanings depending on the configured
# operating mode; that mode-dependent overlay is out of scope for this
# profile, which describes normal (non-sequencer) operation.

doc_id: daikin.altherma-3
name: Daikin Altherma 3 (DCOM-LT/MB Modbus gateway)
version: 2.0.0

imports:
  # Bare (unaliased) import: inline measurand base_quantity qualifiers on points
  # are validated against this catalog by the linter.
  - uri: moddef:stdlib:measurands:1.0.0

enums:
  - type_id: operation_mode
    name: Operation Mode
    # Holding offset 3 / Input offset 38 use overlapping but different codings;
    # this enum follows the holding-register setpoint coding (0:Auto/1:Heating/2:Cooling).
    values:
      - name: AUTO
        value: 0
      - name: HEATING
        value: 1
      - name: COOLING
        value: 2
  - type_id: weather_dependent_mode
    name: Weather Dependent Mode
    values:
      - name: FIXED
        value: 0
      - name: WEATHER_DEPENDENT
        value: 1
      - name: FIXED_SCHEDULED
        value: 2
      - name: WEATHER_DEPENDENT_SCHEDULED
        value: 3
  - type_id: three_way_valve_position
    name: Three-Way Valve Position
    values:
      - name: SPACE_HEATING
        value: 0
      - name: DHW
        value: 1
  - type_id: unit_error
    name: Unit Error
    values:
      - name: NO_ERROR
        value: 0
      - name: FAULT
        value: 1
      - name: WARNING
        value: 2

devices:
  - device_id: daikin-altherma-3
    vendor: Daikin
    model: Altherma 3 (air-to-water)
    supported_transports:
      - MODBUS_RTU
    blocks:
      # ----- Holding registers: setpoints, modes, on/off (read/write) -----
      - block_id: holding
        name: Holding Registers (setpoints & modes)
        space: HOLDING_REGISTER
        start_offset: 1
        length_words: 55
        points:
          - point_id: lwt_heating_setpoint
            name: Leaving Water Main Heating Setpoint
            description: Leaving water main heating setpoint (writable, 25..55 degC)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 1
              length_words: 1
            unit: degC
            measurand:
              base_quantity: temperature
              location: OUTLET
            write:
              behavior: DIRECT
              constraints:
                min_value:
                  numerator: 25
                  denominator: 1
                max_value:
                  numerator: 55
                  denominator: 1
                step:
                  numerator: 1
                  denominator: 1

          - point_id: lwt_cooling_setpoint
            name: Leaving Water Main Cooling Setpoint
            description: Leaving water main cooling setpoint (writable, 5..22 degC)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 2
              length_words: 1
            unit: degC
            measurand:
              base_quantity: temperature
              location: OUTLET
            write:
              behavior: DIRECT
              constraints:
                min_value:
                  numerator: 5
                  denominator: 1
                max_value:
                  numerator: 22
                  denominator: 1
                step:
                  numerator: 1
                  denominator: 1

          - point_id: operation_mode_set
            name: Operation Mode
            description: Operation mode setpoint (0 Auto, 1 Heating, 2 Cooling)
            access: READ_WRITE
            storage_type: S16
            value_type:
              enum_ref:
                type_id: operation_mode
            mapping:
              space: HOLDING_REGISTER
              offset: 3
              length_words: 1
            measurand:
              base_quantity: device_status
            write:
              behavior: DIRECT
              constraints:
                allowed_values:
                  - 0
                  - 1
                  - 2

          - point_id: space_heating_cooling_onoff
            name: Space Heating/Cooling On/Off
            description: Space heating/cooling enable (0 Off, 1 On)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: HOLDING_REGISTER
              offset: 4
              length_words: 1
            write:
              behavior: DIRECT
              constraints:
                allowed_values:
                  - 0
                  - 1

          - point_id: room_thermostat_heating_setpoint
            name: Room Thermostat Control Heating Setpoint
            description: Room thermostat control heating setpoint (writable, 12..30 degC)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 6
              length_words: 1
            unit: degC
            measurand:
              base_quantity: temperature
              location: INTERNAL
            write:
              behavior: DIRECT
              constraints:
                min_value:
                  numerator: 12
                  denominator: 1
                max_value:
                  numerator: 30
                  denominator: 1
                step:
                  numerator: 1
                  denominator: 1

          - point_id: dhw_reheat_setpoint
            name: DHW Reheat Setpoint
            description: Domestic hot water reheat setpoint (writable, 30..60 degC)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 10
              length_words: 1
            unit: degC
            measurand:
              base_quantity: temperature
              location: OUTLET
            write:
              behavior: DIRECT
              constraints:
                min_value:
                  numerator: 30
                  denominator: 1
                max_value:
                  numerator: 60
                  denominator: 1
                step:
                  numerator: 1
                  denominator: 1

          - point_id: dhw_reheat_onoff
            name: DHW Reheat On/Off
            description: Domestic hot water reheat enable (0 Off, 1 On)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: HOLDING_REGISTER
              offset: 12
              length_words: 1
            write:
              behavior: DIRECT
              constraints:
                allowed_values:
                  - 0
                  - 1

          - point_id: room_thermostat_cooling_setpoint
            name: Room Thermostat Control Cooling Setpoint
            description: Room thermostat control cooling setpoint (writable, 15..35 degC)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 7
              length_words: 1
            unit: degC
            measurand:
              base_quantity: temperature
              location: INTERNAL
            write:
              behavior: DIRECT
              constraints:
                min_value:
                  numerator: 15
                  denominator: 1
                max_value:
                  numerator: 35
                  denominator: 1
                step:
                  numerator: 1
                  denominator: 1

          - point_id: quiet_mode
            name: Quiet Mode Operation
            description: Quiet mode operation enable (0 Off, 1 On)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: HOLDING_REGISTER
              offset: 9
              length_words: 1
            write:
              behavior: DIRECT
              constraints:
                allowed_values:
                  - 0
                  - 1

          - point_id: dhw_booster_mode
            name: DHW Booster Mode On/Off
            description: Domestic hot water booster mode enable (0 Off, 1 On)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: HOLDING_REGISTER
              offset: 13
              length_words: 1
            write:
              behavior: DIRECT
              constraints:
                allowed_values:
                  - 0
                  - 1

          - point_id: weather_dependent_mode
            name: Weather Dependent Mode
            description: Leaving-water setpoint mode (fixed / weather dependent, with optional scheduling)
            access: READ_WRITE
            storage_type: S16
            value_type:
              enum_ref:
                type_id: weather_dependent_mode
            mapping:
              space: HOLDING_REGISTER
              offset: 53
              length_words: 1
            write:
              behavior: DIRECT
              constraints:
                allowed_values:
                  - 0
                  - 1
                  - 2
                  - 3

          - point_id: wd_lwt_heating_offset
            name: Weather Dependent Mode LWT Heating Setpoint Offset
            description: Offset applied to the weather-dependent leaving water heating setpoint (-10..10 degC)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 54
              length_words: 1
            unit: degC
            write:
              behavior: DIRECT
              constraints:
                min_value:
                  numerator: -10
                  denominator: 1
                max_value:
                  numerator: 10
                  denominator: 1
                step:
                  numerator: 1
                  denominator: 1

          - point_id: wd_lwt_cooling_offset
            name: Weather Dependent Mode LWT Cooling Setpoint Offset
            description: Offset applied to the weather-dependent leaving water cooling setpoint (-10..10 degC)
            access: READ_WRITE
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: HOLDING_REGISTER
              offset: 55
              length_words: 1
            unit: degC
            write:
              behavior: DIRECT
              constraints:
                min_value:
                  numerator: -10
                  denominator: 1
                max_value:
                  numerator: 10
                  denominator: 1
                step:
                  numerator: 1
                  denominator: 1

      # ----- Input registers: live sensor & status data (read-only) -----
      - block_id: input
        name: Input Registers (sensors & status)
        space: INPUT_REGISTER
        start_offset: 21
        length_words: 30
        points:
          - point_id: unit_error
            name: Unit Error
            description: Overall unit error state (0 No error, 1 Fault, 2 Warning)
            access: READ_ONLY
            storage_type: S16
            value_type:
              enum_ref:
                type_id: unit_error
            mapping:
              space: INPUT_REGISTER
              offset: 21
              length_words: 1
            measurand:
              base_quantity: alarm_status

          - point_id: unit_error_code
            name: Unit Error Code
            description: Daikin fault code as two ASCII characters, '--' (11565) when no error (text16)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type:
              primitive: STRING
            mapping:
              space: INPUT_REGISTER
              offset: 22
              length_words: 1
              string_encoding: { charset: ASCII, padding: PADDING_SPACE, termination: FIXED_LENGTH }
            measurand:
              base_quantity: fault_code

          - point_id: unit_error_sub_code
            name: Unit Error Sub Code
            description: Fault sub code 0..99; 32766 when no error
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: INT32
            mapping:
              space: INPUT_REGISTER
              offset: 23
              length_words: 1
            na_values:
              - { raw: 32766, meaning: no_error }
            measurand:
              base_quantity: fault_code

          - point_id: circulation_pump_running
            name: Circulation Pump Running
            description: Circulation pump run state (0 Off, 1 On)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: INPUT_REGISTER
              offset: 30
              length_words: 1

          - point_id: compressor_running
            name: Compressor Run
            description: Compressor run state (0 Off, 1 On)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: INPUT_REGISTER
              offset: 31
              length_words: 1

          - point_id: booster_heater_running
            name: Booster Heater Run
            description: Booster heater run state (0 Off, 1 On)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: INPUT_REGISTER
              offset: 32
              length_words: 1

          - point_id: disinfection_operation
            name: Disinfection Operation
            description: Disinfection (anti-legionella) operation state (0 Off, 1 On)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: INPUT_REGISTER
              offset: 33
              length_words: 1

          - point_id: defrost_startup
            name: Defrost/Startup
            description: Defrost or startup operation state (0 Off, 1 On)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: INPUT_REGISTER
              offset: 35
              length_words: 1

          - point_id: hot_start
            name: Hot Start
            description: Hot start operation state (0 Off, 1 On)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: BOOL
            mapping:
              space: INPUT_REGISTER
              offset: 36
              length_words: 1

          - point_id: three_way_valve
            name: 3-Way Valve
            description: 3-way valve position (0 space heating, 1 DHW)
            access: READ_ONLY
            storage_type: S16
            value_type:
              enum_ref:
                type_id: three_way_valve_position
            mapping:
              space: INPUT_REGISTER
              offset: 37
              length_words: 1
            measurand:
              base_quantity: device_status

          - point_id: operation_mode_actual
            name: Operation Mode (actual)
            description: Current operation mode reported by the unit (1 Heating, 2 Cooling)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: INT32
            mapping:
              space: INPUT_REGISTER
              offset: 38
              length_words: 1
            measurand:
              base_quantity: device_status

          - point_id: leaving_water_temp_phe
            name: Leaving Water Temperature pre PHE
            description: Leaving water temperature before plate heat exchanger
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: INPUT_REGISTER
              offset: 40
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 100
            unit: degC
            measurand:
              base_quantity: temperature
              location: OUTLET

          - point_id: leaving_water_temp_buh
            name: Leaving Water Temperature pre BUH
            description: Leaving water temperature before backup heater
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: INPUT_REGISTER
              offset: 41
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 100
            unit: degC
            measurand:
              base_quantity: temperature
              location: OUTLET

          - point_id: return_water_temp
            name: Return Water Temperature
            description: Return water temperature into the unit
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: INPUT_REGISTER
              offset: 42
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 100
            unit: degC
            measurand:
              base_quantity: temperature
              location: INLET

          - point_id: dhw_temp
            name: Domestic Hot Water Temperature
            description: Domestic hot water tank temperature
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: INPUT_REGISTER
              offset: 43
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 100
            unit: degC
            measurand:
              base_quantity: temperature
              location: OUTLET

          - point_id: outside_air_temp
            name: Outside Air Temperature
            description: Outdoor ambient air temperature measured by the unit
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: INPUT_REGISTER
              offset: 44
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 100
            unit: degC
            measurand:
              base_quantity: temperature
              location: EXTERNAL

          - point_id: liquid_refrigerant_temp
            name: Liquid Refrigerant Temperature
            description: Liquid refrigerant temperature
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: INPUT_REGISTER
              offset: 45
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 100
            unit: degC
            measurand:
              base_quantity: temperature
              location: INTERNAL

          - point_id: flow_rate
            name: Flow Rate
            description: Water flow rate through the unit in litres/minute (raw value x100; no stdlib unit/measurand maps cleanly)
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: INPUT_REGISTER
              offset: 49
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 100

          - point_id: remocon_room_temp
            name: Remote Controller Room Temperature
            description: Room temperature measured at the remote controller
            access: READ_ONLY
            storage_type: S16
            value_type:
              primitive: DECIMAL
            mapping:
              space: INPUT_REGISTER
              offset: 50
              length_words: 1
            transform:
              scale:
                numerator: 1
                denominator: 100
            unit: degC
            measurand:
              base_quantity: temperature
              location: INTERNAL
