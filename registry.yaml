# The ModDef blessed device registry.
# Curated, versioned device profiles that ship as the default registry for `moddef search`.
# Every profile lints clean (0 errors) and is derived from a vendor-confirmed register map;
# see each profile's attribution header for the exact source. status: vendor-confirmed means
# the register map matches vendor documentation but has not yet been verified on hardware.

