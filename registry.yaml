# The ModDef blessed device registry.
# Curated, versioned device profiles that ship as the default registry for `moddef search`.
# Every profile lints clean (0 errors) and is derived from a vendor-confirmed register map;
# see each profile's attribution header for the exact source. status: vendor-confirmed means
# the register map matches vendor documentation but has not yet been verified on hardware.

version: 1
devices:
- vendor: Fronius
  model: Symo / Primo GEN24 Plus
  category: solar-inverter
  doc_id: fronius.gen24
  profile: solar-inverter/fronius-gen24/fronius-gen24.moddef.yaml
  transports:
  - MODBUS_TCP
  - MODBUS_RTU
  points: 18
  status: vendor-confirmed
  source: Fronius GEN24 Modbus TCP & RTU operating instructions (doc 42,0410,2649), SunSpec models — Common
    model (1) + int+SF three-phase inverter model 103
  source_url: https://www.fronius.com/~/downloads/Solar%20Energy/Operating%20Instructions/42,0410,2649.pdf
  measurands:
  - current
  - voltage
  - active_power
  - frequency
  - energy_active
  - inverter_temperature
  - inverter_status
