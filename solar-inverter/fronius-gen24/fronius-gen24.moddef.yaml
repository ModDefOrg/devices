      # --- SunSpec Basic Storage Control model (124): charge/discharge window, minimum SOC and grid charging. Storage devices only; requires 'inverter control via Modbus'. int+SF ID reg 40343. ---
      - block_id: storage_control
        name: SunSpec Basic Storage Control Model (124)
        space: HOLDING_REGISTER
        start_offset: 40342
        length_words: 26
        discovery:
          kind: SUNSPEC
          anchor_candidates: [0, 40000, 50000]
          model_id: 124
        points:
          - point_id: wcha_max_sf
            name: WChaMax Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 18 }

          - point_id: storage_max_charge_power
            name: Storage Reference Power
            description: Reference value for InWRte/OutWRte; max(MaxChaRte, MaxDisChaRte), 0 when no storage present (model 124 WChaMax)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 2 }
            transform: { scale_ref: { point_id: wcha_max_sf, mode: POW10 } }
            unit: W
            measurand: { base_quantity: charge_limit }
            write:
              behavior: DIRECT

          - point_id: wcha_discha_gra_sf
            name: Charge/Discharge Gradient Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 19 }

          - point_id: storage_charge_gradient
            name: Storage Charge Gradient
            description: Maximum charge rate as percent of maximum (model 124 WChaGra)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 3 }
            transform: { scale_ref: { point_id: wcha_discha_gra_sf, mode: POW10 } }
            unit: "%"
            write:
              behavior: DIRECT

          - point_id: storage_discharge_gradient
            name: Storage Discharge Gradient
            description: Maximum discharge rate as percent of maximum (model 124 WDisChaGra)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 4 }
            transform: { scale_ref: { point_id: wcha_discha_gra_sf, mode: POW10 } }
            unit: "%"
            write:
              behavior: DIRECT

          - point_id: storage_control_mode
            name: Storage Control Mode
            description: Active charge/discharge limit enable bits; bit 0 charge limit, bit 1 discharge limit (model 124 StorCtl_Mod)
            access: READ_WRITE
            storage_type: U16
            value_type:
              flags:
                bits:
                  "0": charge_limit_active
                  "1": discharge_limit_active
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 5 }
            write:
              behavior: DIRECT

          - point_id: vacha_max_sf
            name: VAChaMax Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
