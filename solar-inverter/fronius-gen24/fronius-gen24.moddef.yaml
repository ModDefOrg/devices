# Source: Fronius GEN24 Modbus TCP & RTU operating instructions (doc 42,0410,2649), SunSpec models
# https://www.fronius.com/~/downloads/Solar%20Energy/Operating%20Instructions/42,0410,2649.pdf
# Register map confirmed against the vendor document above; not yet hardware-verified.
# Part of the ModDef blessed device registry.
#
# SunSpec-native profile. The GEN24 exposes a dynamic SunSpec register chain whose
# absolute addresses shift with model composition, so points are mapped by
# model_relative_offset and located at runtime via SUNSPEC discovery (anchor
# candidates 0 / 40000 / 50000). Two device-side SunSpec map types exist:
#   - "float"  : inverter models 111/112/113 (no scale-factor registers)
#   - "int+SF" : inverter models 101/102/103 (integer values + sunssf scale regs)
# This profile models the "int+SF" three-phase inverter model 103 (Symo) so it can
# demonstrate register-referenced scale factors (transform.scale_ref, value = raw*10^SF),
# alongside the Common model (1) identification block.
#
# Address-space / offset convention:
#   - All SunSpec data lives in the Modbus holding-register space (read via FC 03).
#   - The doc addresses registers 1-based with SunSpec base register 40001; the
#     wire address sent is always (register - 1). ModDef offsets are 0-based wire
#     offsets, so documented holding register 4xxxx -> offset = addr - 40001.
#   - block.start_offset is the 0-based wire offset of each model's ID register
#     (Common model ID at reg 40003 -> offset 40002; inverter model 103 ID at
#     reg 40071 -> offset 40070, per the doc's int+SF start addresses).
#   - point mapping.model_relative_offset is measured from the model-ID register
#     (offset 0 = model ID, offset 1 = model length, data follows). This matches
#     the canonical SunSpec model 1 / model 103 register layout.
#
# SunSpec "not implemented" sentinels (doc "Nicht vorhandene Datensaetze"):
#   uint16 -> 0xFFFF (65535), sint16 -> 0x8000 (32768).
#
# Coverage: full int+SF model chain documented for the GEN24 -
#   Common (1)                 ID reg 40003  -> offset 40002
#   Inverter three-phase (103) ID reg 40071  -> offset 40070
#   Nameplate (120)            ID reg 40121  -> offset 40120
#   Basic Settings (121)       ID reg 40149  -> offset 40148
#   Ext. Measurements (122)    ID reg 40181  -> offset 40180
#   Immediate Controls (123)   ID reg 40227  -> offset 40226
#   Multiple MPPT (160)        ID reg 40253  -> offset 40252 (4 modules: PV1,
#                              PV2, storage charge MPP3, storage discharge MPP4)
#   Basic Storage Control (124) ID reg 40343 -> offset 40342 (hybrid devices)
# Note: the doc's model chain implies the inverter model occupies 50 words
# (40071..40120), i.e. the trailing EvtVnd4 word pair of the canonical model
# 103 layout is not exposed; points stop at EvtVnd3 accordingly.
# Out of scope here: SunSpec 7xx DER models (Primo GEN24 208-240 US devices
# only), the meter models (separate device behind its own Modbus unit id),
# and the "float" register map (inverter models 111-113).

doc_id: fronius.gen24
name: Fronius Symo/Primo GEN24 Plus (SunSpec int+SF)
version: 2.0.0

imports:
  - uri: moddef:stdlib:measurands:1.0.0

enums:
  # SunSpec Operating Codes (St) as documented in the GEN24 manual, p.23.
  - type_id: fronius_inverter_state
    name: Fronius Inverter Operating State
    description: SunSpec inverter operating code (St) reported by the GEN24
    values:
      - { value: 1, name: OFF }
      - { value: 2, name: SLEEPING }
      - { value: 3, name: STARTING }
      - { value: 4, name: MPPT }
      - { value: 5, name: THROTTLED }
      - { value: 6, name: SHUTTING_DOWN }
      - { value: 7, name: FAULT }
      - { value: 8, name: STANDBY }

  - type_id: storage_charge_status
    name: Storage Charge Status
    description: SunSpec model 124 ChaSt battery operating status
    values:
      - { value: 1, name: "OFF" }
      - { value: 2, name: EMPTY }
      - { value: 3, name: DISCHARGING }
      - { value: 4, name: CHARGING }
      - { value: 5, name: FULL }
      - { value: 6, name: HOLDING }
      - { value: 7, name: TESTING }
  - type_id: grid_charge_set
    name: Grid Charge Setting
    description: SunSpec model 124 ChaGriSet charging source permission
    values:
      - { value: 0, name: PV_ONLY }
      - { value: 1, name: GRID_ALLOWED }

devices:
  - device_id: fronius-gen24
    vendor: Fronius
    model: Symo/Primo GEN24 Plus
    family: GEN24
    supported_transports: [MODBUS_TCP, MODBUS_RTU]
    blocks:
      # --- SunSpec Common model (1): device identification ---
      # int+SF map: Common model ID register is 40003 -> wire offset 40002.
      # Layout: offset 0 = ID(1), offset 1 = L(66), then Mn/Md/Opt/Vr/SN/DA.
      - block_id: common
        name: SunSpec Common Model (1)
        space: HOLDING_REGISTER
        start_offset: 40002
        length_words: 68
        discovery:
          kind: SUNSPEC
          anchor_candidates: [0, 40000, 50000]
          model_id: 1
        points:
          - point_id: manufacturer
            name: Manufacturer
            description: Manufacturer name (Common model Mn); reports "Fronius"
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              model_relative_offset: 2
              length_words: 16
              string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED }
          - point_id: model
            name: Model
            description: Device model name (Common model Md)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              model_relative_offset: 18
              length_words: 16
              string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED }
          - point_id: version
            name: Firmware Version
            description: Software/firmware version string (Common model Vr)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              model_relative_offset: 42
              length_words: 8
              string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED }
          - point_id: serial_number
            name: Serial Number
            description: Device serial number (Common model SN)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              model_relative_offset: 50
              length_words: 16
              string_encoding: { charset: ASCII, padding: PADDING_NULL, termination: NULL_TERMINATED }

      # --- SunSpec Inverter model (103, three-phase, int+SF): live measurements ---
      # int+SF map: model-103 ID register is 40071 -> wire offset 40070.
      # Offsets below are the canonical SunSpec model 103 register offsets,
      # measured from the model-ID register (offset 0 = ID, offset 1 = L).
      - block_id: inverter
        name: SunSpec Inverter Model 103 (three-phase)
        space: HOLDING_REGISTER
        start_offset: 40070
        length_words: 50
        discovery:
          kind: SUNSPEC
          anchor_candidates: [0, 40000, 50000]
          model_id: 103
        points:
          # ---- AC current (A, AphA) + shared current scale factor (A_SF) ----
          - point_id: ac_current_sf
            name: AC Current Scale Factor
            description: sunssf scale factor for all AC current points (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 6 }
          - point_id: ac_current_total
            name: AC Total Current
            description: Total AC output current summed across phases (model 103 A)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: A
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 2 }
            transform: { scale_ref: { point_id: ac_current_sf, mode: POW10 } }
            measurand: { base_quantity: current }
            na_values: [{ raw: 65535, meaning: not_implemented }]
          - point_id: ac_current_l1
            name: AC Current L1
            description: AC current on phase A / L1 (model 103 AphA)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: A
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 3 }
            transform: { scale_ref: { point_id: ac_current_sf, mode: POW10 } }
            measurand: { base_quantity: current, phase_ref: L1_N }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          # ---- AC voltage (line-to-neutral) + shared voltage scale factor (V_SF) ----
          - point_id: ac_voltage_sf
            name: AC Voltage Scale Factor
            description: sunssf scale factor for all AC voltage points (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 13 }
          - point_id: ac_voltage_l1_n
            name: AC Voltage L1-N
            description: Line-to-neutral AC voltage on phase A / L1 (model 103 PhVphA)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 10 }
            transform: { scale_ref: { point_id: ac_voltage_sf, mode: POW10 } }
            measurand: { base_quantity: voltage, phase_ref: L1_N }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          # ---- AC real power (W) + scale factor (W_SF) ----
          - point_id: ac_power_sf
            name: AC Power Scale Factor
            description: sunssf scale factor for AC real power (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 15 }
          - point_id: ac_power
            name: AC Real Power
            description: Total AC active power output (model 103 W)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            unit: W
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 14 }
            transform: { scale_ref: { point_id: ac_power_sf, mode: POW10 } }
            measurand: { base_quantity: active_power, aggregation: TOTAL }
            na_values: [{ raw: 32768, meaning: not_implemented }]

          # ---- Grid frequency (Hz) + scale factor (Hz_SF) ----
          - point_id: ac_frequency_sf
            name: AC Frequency Scale Factor
            description: sunssf scale factor for grid frequency (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 17 }
          - point_id: ac_frequency
            name: AC Frequency
            description: AC grid frequency (model 103 Hz)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: Hz
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 16 }
            transform: { scale_ref: { point_id: ac_frequency_sf, mode: POW10 } }
            measurand: { base_quantity: frequency }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          # ---- Lifetime AC energy (Wh, acc32) + scale factor (WH_SF) ----
          - point_id: ac_energy_sf
            name: AC Energy Scale Factor
            description: sunssf scale factor for lifetime AC energy (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 26 }
          - point_id: ac_energy_total
            name: AC Lifetime Energy
            description: Total cumulative AC energy produced (model 103 WH, acc32)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            unit: Wh
            mapping:
              space: HOLDING_REGISTER
              model_relative_offset: 24
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            transform: { scale_ref: { point_id: ac_energy_sf, mode: POW10 } }
            measurand: { base_quantity: energy_active, direction: EXPORT, accumulation: LIFETIME }

          # ---- Cabinet/heatsink temperature (degC) + scale factor (Tmp_SF) ----
          - point_id: ac_temp_sf
            name: Temperature Scale Factor
            description: sunssf scale factor for temperature points (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 37 }
          - point_id: cabinet_temperature
            name: Cabinet Temperature
            description: Internal cabinet temperature (model 103 TmpCab)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            unit: degC
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 33 }
            transform: { scale_ref: { point_id: ac_temp_sf, mode: POW10 } }
            measurand: { base_quantity: inverter_temperature, location: INTERNAL }
            na_values: [{ raw: 32768, meaning: not_implemented }]

          # ---- Operating state (St, enum16) ----
          - point_id: operating_state
            name: Operating State
            description: SunSpec inverter operating code St (see fronius_inverter_state)
            access: READ_ONLY
            storage_type: U16
            value_type: { enum_ref: { type_id: fronius_inverter_state } }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 38 }
            measurand: { base_quantity: inverter_status }

          - point_id: ac_current_l2
            name: AC Current L2
            description: Phase B AC current (model 103 AphB)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 4 }
            transform: { scale_ref: { point_id: ac_current_sf, mode: POW10 } }
            unit: A
            measurand: { base_quantity: current, phase_ref: L2 }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: ac_current_l3
            name: AC Current L3
            description: Phase C AC current (model 103 AphC)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 5 }
            transform: { scale_ref: { point_id: ac_current_sf, mode: POW10 } }
            unit: A
            measurand: { base_quantity: current, phase_ref: L3 }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: ac_voltage_l1_l2
            name: AC Voltage L1-L2
            description: Phase AB line voltage (model 103 PPVphAB)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 7 }
            transform: { scale_ref: { point_id: ac_voltage_sf, mode: POW10 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L1_L2 }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: ac_voltage_l2_l3
            name: AC Voltage L2-L3
            description: Phase BC line voltage (model 103 PPVphBC)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 8 }
            transform: { scale_ref: { point_id: ac_voltage_sf, mode: POW10 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L2_L3 }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: ac_voltage_l3_l1
            name: AC Voltage L3-L1
            description: Phase CA line voltage (model 103 PPVphCA)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 9 }
            transform: { scale_ref: { point_id: ac_voltage_sf, mode: POW10 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L3_L1 }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: ac_voltage_l2_n
            name: AC Voltage L2-N
            description: Phase B to neutral voltage (model 103 PhVphB)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 11 }
            transform: { scale_ref: { point_id: ac_voltage_sf, mode: POW10 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L2_N }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: ac_voltage_l3_n
            name: AC Voltage L3-N
            description: Phase C to neutral voltage (model 103 PhVphC)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 12 }
            transform: { scale_ref: { point_id: ac_voltage_sf, mode: POW10 } }
            unit: V
            measurand: { base_quantity: voltage, phase_ref: L3_N }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: apparent_power_sf
            name: Apparent Power Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 19 }

          - point_id: apparent_power
            name: AC Apparent Power
            description: Total AC apparent power (model 103 VA)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 18 }
            transform: { scale_ref: { point_id: apparent_power_sf, mode: POW10 } }
            unit: VA
            measurand: { base_quantity: apparent_power }
            na_values: [{ raw: 32768, meaning: not_implemented }]

          - point_id: reactive_power_sf
            name: Reactive Power Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 21 }

          - point_id: reactive_power
            name: AC Reactive Power
            description: Total AC reactive power (model 103 VAr)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 20 }
            transform: { scale_ref: { point_id: reactive_power_sf, mode: POW10 } }
            unit: var
            measurand: { base_quantity: reactive_power }
            na_values: [{ raw: 32768, meaning: not_implemented }]

          - point_id: power_factor_sf
            name: Power Factor Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 23 }

          - point_id: power_factor
            name: AC Power Factor
            description: Total AC power factor in percent of unity (model 103 PF)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 22 }
            transform: { scale_ref: { point_id: power_factor_sf, mode: POW10 } }
            unit: "%"
            na_values: [{ raw: 32768, meaning: not_implemented }]

          - point_id: dc_current_sf
            name: DC Current Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 28 }

          - point_id: dc_current
            name: DC Current
            description: Total DC current; not implemented on multi-MPPT devices, see model 160 (model 103 DCA)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 27 }
            transform: { scale_ref: { point_id: dc_current_sf, mode: POW10 } }
            unit: A
            measurand: { base_quantity: pv_current }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: dc_voltage_sf
            name: DC Voltage Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 30 }

          - point_id: dc_voltage
            name: DC Voltage
            description: DC voltage; not implemented on multi-MPPT devices, see model 160 (model 103 DCV)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 29 }
            transform: { scale_ref: { point_id: dc_voltage_sf, mode: POW10 } }
            unit: V
            measurand: { base_quantity: pv_voltage }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: dc_power_sf
            name: DC Power Scale Factor
            description: sunssf scale factor register (value = raw * 10^sf)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: INT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 32 }

          - point_id: dc_power
            name: DC Power
            description: Total DC power across all inputs (model 103 DCW)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 31 }
            transform: { scale_ref: { point_id: dc_power_sf, mode: POW10 } }
            unit: W
            measurand: { base_quantity: pv_power }
            na_values: [{ raw: 32768, meaning: not_implemented }]

          - point_id: heatsink_temperature
            name: Heatsink Temperature
            description: Heatsink temperature (model 103 TmpSnk)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 34 }
            transform: { scale_ref: { point_id: ac_temp_sf, mode: POW10 } }
            unit: degC
            measurand: { base_quantity: inverter_temperature, location: INTERNAL }
            na_values: [{ raw: 32768, meaning: not_implemented }]

          - point_id: transformer_temperature
            name: Transformer Temperature
            description: Transformer temperature (model 103 TmpTrns)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 35 }
            transform: { scale_ref: { point_id: ac_temp_sf, mode: POW10 } }
            unit: degC
            measurand: { base_quantity: temperature, location: INTERNAL }
            na_values: [{ raw: 32768, meaning: not_implemented }]

          - point_id: other_temperature
            name: Other Temperature
            description: Other temperature (model 103 TmpOt)
            access: READ_ONLY
            storage_type: S16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 36 }
            transform: { scale_ref: { point_id: ac_temp_sf, mode: POW10 } }
            unit: degC
            measurand: { base_quantity: temperature, location: INTERNAL }
            na_values: [{ raw: 32768, meaning: not_implemented }]

          - point_id: vendor_state
            name: Vendor Operating State
            description: Vendor-defined operating state (model 103 StVnd)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, model_relative_offset: 39 }
            na_values: [{ raw: 65535, meaning: not_implemented }]

          - point_id: event_flags_1
            name: Event Flags 1
            description: SunSpec event bitfield 1 (model 103 Evt1)
            access: READ_ONLY
            storage_type: U32
            value_type:
              flags:
                bits:
                  "0": ground_fault
                  "1": dc_over_voltage
                  "2": ac_disconnect
                  "3": dc_disconnect
                  "4": grid_disconnect
                  "5": cabinet_open
                  "6": manual_shutdown
                  "7": over_temperature
                  "8": over_frequency
                  "9": under_frequency
                  "10": ac_over_voltage
                  "11": ac_under_voltage
                  "12": blown_string_fuse
                  "13": under_temperature
                  "14": memory_loss
                  "15": hw_test_failure
            mapping:
              space: HOLDING_REGISTER
              model_relative_offset: 40
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            measurand: { base_quantity: alarm_status }

          - point_id: event_flags_2
            name: Event Flags 2
            description: SunSpec event bitfield 2, reserved for future assignment (model 103 Evt2)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping:
              space: HOLDING_REGISTER
              model_relative_offset: 42
              length_words: 2
