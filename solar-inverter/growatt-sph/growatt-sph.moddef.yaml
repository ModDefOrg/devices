      # ---------------------------------------------------------------------
      # Storage settings, "Six group for Storage Power" (holding registers
      # NO.1000-1124, function 0x03). Includes battery limits, priority
      # windows, and grid-first / battery-first time-slot schedules. Time-slot
      # start/stop registers pack hour (high byte) and minute (low byte).
      # Holding 1035 duplicates "Bat First Start Time 4" in the vendor doc and
      # is omitted as a documentation anomaly; 1039-1043, 1045-1046, 1049-1059,
      # 1063-1069, 1072-1079, 1089, 1093-1099 and 1109 are reserved; holding
      # 1110-1118 (Load First slots) are documented as SPA-only/reserve.
      # ---------------------------------------------------------------------
      - block_id: storage_settings
        name: Storage Priority Settings
        space: HOLDING_REGISTER
        start_offset: 1000
        length_words: 125
        points:
          - point_id: float_charge_current_limit
            name: Float Charge Current Limit
            description: Enter float charge when battery charge current is below this value (Float charge current limit)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: A
            mapping: { space: HOLDING_REGISTER, offset: 1000, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            write:
              behavior: DIRECT

          - point_id: storage_settings_memory_state
            name: Storage Settings Memory State
            description: Whether storage settings (registers 1019-1022) persist across power cycles (PF CMD memory state)
            access: READ_WRITE
            storage_type: U16
            value_type:
              enum_ref: { type_id: enable_state }
            mapping: { space: HOLDING_REGISTER, offset: 1001, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]

          - point_id: vbat_start_discharge
            name: Battery Discharge Start Voltage
            description: Lead-acid battery low-voltage discharge start threshold (VbatStartForDischarge)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 1002, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            write:
              behavior: DIRECT

          - point_id: vbat_low_warn_clear
            name: Battery Low Warning Clear Voltage
            description: Voltage at which the battery low-voltage error clears, lead-acid only (VbatlowWarnClr)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 1003, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            write:
              behavior: DIRECT

          - point_id: vbat_stop_discharge
            name: Battery Stop Discharge Voltage
            description: Stop discharging below this voltage, lead-acid only (Vbatstopfordischarge)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 1004, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 100 } }
            write:
              behavior: DIRECT

          - point_id: vbat_stop_charge
            name: Battery Stop Charge Voltage
            description: Stop charging above this voltage (Vbat stop for charge)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 1005, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 100 } }
            write:
              behavior: DIRECT

          - point_id: vbat_min_discharge
            name: Battery Minimum Discharge Voltage
            description: Do not discharge below this voltage (Vbatstartfordischarge, NO.1006)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 1006, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 100 } }
            write:
              behavior: DIRECT

          - point_id: vbat_constant_charge
            name: Battery Constant Charge Voltage
            description: CV charge voltage for lead-acid; charging allowed below this voltage (Vbat constant charge)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 1007, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 100 } }
            write:
              behavior: DIRECT

          - point_id: system_function_enable
            name: System Function Enable
            description: Per-bit storage system enables (EESysInfo.SysSetEn)
            access: READ_WRITE
            storage_type: U16
            value_type:
              flags:
                bits:
                  "5": discharge_enable
                  "6": force_discharge_enable
                  "7": charge_enable
                  "8": force_charge_enable
                  "9": backup_enable
                  "10": inv_limit_load_enable
                  "11": sp_limit_load_enable
                  "12": ac_charge_enable
                  "13": pv_load_limit_enable
            mapping: { space: HOLDING_REGISTER, offset: 1008, length_words: 1 }
            write:
              behavior: DIRECT

          - point_id: bat_temp_lower_limit_discharge
            name: Battery Discharge Temperature Lower Limit
            description: Battery temperature lower limit for discharge; raw 0-200 maps to 0-20 degC and raw 1000-1400 maps to -40-0 degC (Battemp lower limit d) - the negative segment is not expressible as a single linear scale, values above 1000 must be decoded as (raw-1000)*0.1-40
