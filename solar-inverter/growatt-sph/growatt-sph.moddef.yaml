            mapping: { space: INPUT_REGISTER, offset: 120, length_words: 1 }
      # ---------------------------------------------------------------------
      # Storage telemetry, "Ninth group for Storage power"
      # (input registers NO.1000-1125, function 0x04). Includes system fault
      # words, per-phase power flows, energy accumulators, EPS/UPS output and
      # the BMS information section. Input 1039 (REC temperature) is
      # documented "No use", 1043 and 1066 are reserved.
      # The AC charge energy today pair straddles the doc's group boundary
      # (1124 H / 1125 L) and is modeled here as one 32-bit point.
      # ---------------------------------------------------------------------
      - block_id: storage_live
        name: Storage / Battery Live Telemetry
        space: INPUT_REGISTER
        start_offset: 1000
        length_words: 126
        points:
          - point_id: system_work_mode
            name: System Work Mode
            description: Storage system operating mode (uwSysWorkMode)
            access: READ_ONLY
            storage_type: U16
            value_type:
              enum_ref: { type_id: system_work_mode }
            mapping: { space: INPUT_REGISTER, offset: 1000, length_words: 1 }
            measurand: { base_quantity: device_status }

          - point_id: system_fault_word_0
            name: System Fault Word 0
            description: System fault word 0; refer to the Hybrid fault description (Systemfault word0)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1001, length_words: 1 }
            measurand: { base_quantity: fault_code }

          - point_id: system_fault_word_1
