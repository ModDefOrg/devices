# Source: Growatt Inverter Modbus RTU Protocol II V1.39 (SPH/hybrid section)
# https://www.growatt.com/ (Modbus RTU Protocol II)
# Register map confirmed against the vendor document above; not yet hardware-verified.
# Part of the ModDef blessed device registry.
#
# Proprietary Growatt map (NOT SunSpec). The document numbers input (0x04) and
# holding (0x03) registers with 0-based "NO." values, so the ModDef offset equals
# the documented NO. directly (offset = NO.; no 30001/40001 base subtraction).
#   - Live telemetry      -> INPUT_REGISTER (function 0x04)
#   - Settings / setpoints -> HOLDING_REGISTER (function 0x03)
# Multi-word values are big-endian, high word first (H register then L register):
# byte_order BIG_ENDIAN + word_order WORD_BIG_ENDIAN. Static scaling per the doc
# (commonly x0.1) is expressed as transform.scale.
#
# Coverage: the full documented SPH register scope (doc §1.2):
#   holding 0-124 (common settings), holding 1000-1124 (storage settings incl.
#   grid-first/battery-first time slots), input 0-124 (PV/grid live), input
#   1000-1249 (storage/BMS live). Registers documented as Reserved, SPA-only
#   (e.g. holding 1110-1118 Load First slots, input 1131-1140) or overloaded
#   with a different meaning on non-SPH models (input 113-115) are omitted;
#   see inline comments at each omission.
#
# Time-slot registers pack hour into the high byte and minute into the low byte
# of one 16-bit register; these are modeled with v0.4 register fields.

doc_id: growatt.sph
name: Growatt SPH Hybrid Storage Inverter
version: 2.0.0

imports:
  - uri: moddef:stdlib:measurands:1.0.0

enums:
  # Input register 0: inverter run state as documented for the first group.
  - type_id: inverter_run_state
    name: Inverter Run State
    values:
      - name: WAITING
        value: 0
      - name: NORMAL
        value: 1
      - name: FAULT
        value: 3
  # Input register 1000 (uwSysWorkMode): values surfaced to monitoring.
  - type_id: system_work_mode
    name: System Work Mode
    values:
      - name: WAITING
        value: 0
      - name: SELF_TEST
        value: 1
      - name: RESERVED
        value: 2
      - name: SYS_FAULT
        value: 3
      - name: FLASH
        value: 4
      - name: PV_BAT_ONLINE
        value: 5
      - name: BAT_ONLINE
        value: 6
      - name: PV_OFFLINE
        value: 7
      - name: BAT_OFFLINE
        value: 8
  # Holding register 1044 (Priority) / input register 118: energy-management priority.
  - type_id: energy_priority
    name: Energy Priority
    values:
      - name: LOAD_FIRST
        value: 0
      - name: BATTERY_FIRST
        value: 1
      - name: GRID_FIRST
        value: 2
  # Generic 0/1 enable used by many switches.
  - type_id: enable_state
    name: Enable State
    values:
      - name: DISABLED
        value: 0
      - name: ENABLED
        value: 1
  # Holding register 0 (OnOff): inverter and BDC remote on/off.
  - type_id: remote_on_off_state
    name: Remote On/Off State
    values:
      - name: INVERTER_OFF
        value: 0
      - name: INVERTER_ON
        value: 1
      - name: BDC_OFF
        value: 2
      - name: BDC_ON
        value: 3
  # Holding register 15.
  - type_id: lcd_language
    name: LCD Language
    values:
      - name: ITALIAN
        value: 0
      - name: ENGLISH
        value: 1
      - name: GERMAN
        value: 2
      - name: SPANISH
        value: 3
      - name: FRENCH
        value: 4
      - name: CHINESE
        value: 5
      - name: POLISH
        value: 6
      - name: PORTUGUESE
        value: 7
      - name: HUNGARIAN
        value: 8
  # Holding register 22.
  - type_id: baud_rate_select
    name: Baud Rate Select
    values:
      - name: BPS_9600
        value: 0
      - name: BPS_38400
        value: 1
  # Holding register 89 (PFModel).
  - type_id: pf_model
    name: PF Function Model
    values:
      - name: PF_UNITY
        value: 0
      - name: PF_BY_SET
        value: 1
      - name: DEFAULT_PF_LINE
        value: 2
      - name: USER_PF_LINE
        value: 3
      - name: UNDER_EXCITED_REACTIVE
        value: 4
      - name: OVER_EXCITED_REACTIVE
        value: 5
      - name: QV_MODEL
        value: 6
      - name: DIRECT_CONTROL
        value: 7
      - name: STATIC_CAPACITIVE_QV
        value: 8
      - name: STATIC_INDUCTIVE_QV
        value: 9
  # Holding register 122 (ExportLimit_En/dis).
  - type_id: export_limit_mode
    name: Export Limit Mode
    values:
      - name: DISABLED
        value: 0
      - name: RS485_EXPORT_LIMIT
        value: 1
      - name: RS232_EXPORT_LIMIT
        value: 2
      - name: CT_EXPORT_LIMIT
        value: 3
  # Holding register 124 (TrakerModel).
  - type_id: tracker_model
    name: Tracker Model
    values:
      - name: INDEPENDENT
        value: 0
      - name: DC_SOURCE
        value: 1
      - name: PARALLEL
        value: 2
  # Holding register 1037 (bCTMode).
  - type_id: ct_mode
    name: CT Mode
    values:
      - name: WIRED_CT
        value: 0
      - name: WIRELESS_CT
        value: 1
      - name: METER
        value: 2
  # Holding register 1048: battery type selection (note: differs from the
  # input-register 119 status encoding).
  - type_id: battery_type_setting
    name: Battery Type (Setting)
    values:
      - name: LITHIUM
        value: 0
      - name: LEAD_ACID
        value: 1
      - name: OTHER
        value: 2
  # Input register 119: battery type as reported (reversed vs holding 1048).
  - type_id: battery_type_status
    name: Battery Type (Status)
    values:
      - name: LEAD_ACID
        value: 0
      - name: LITHIUM
        value: 1
  # Holding register 1061.
  - type_id: ups_output_voltage
    name: UPS Output Voltage Setting
    values:
      - name: V_230
        value: 0
      - name: V_208
        value: 1
      - name: V_240
        value: 2
  # Holding register 1062.
  - type_id: ups_output_frequency
    name: UPS Output Frequency Setting
    values:
      - name: HZ_50
        value: 0
      - name: HZ_60
        value: 1
  # Input register 104 (DeratingMode).
  - type_id: derating_mode
    name: Derating Mode
    values:
      - name: NO_DERATE
        value: 0
      - name: PV
        value: 1
      - name: RESERVED_2
        value: 2
      - name: VAC
        value: 3
      - name: FAC
        value: 4
      - name: TBOOST
        value: 5
      - name: TINV
        value: 6
      - name: CONTROL
        value: 7
      - name: RESERVED_8
        value: 8
      - name: OVER_BACK_BY_TIME
        value: 9
  # Holding register 1047 (AgingTestStepCmd).
  - type_id: aging_test_step
    name: Aging Test Step
    values:
      - name: DEFAULT
        value: 0
      - name: CHARGE
        value: 1
      - name: DISCHARGE
        value: 2
  # Holding register 1119 / input register 1199 (NewEPowerCalcFlag).
  - type_id: energy_calc_formula
    name: Energy Calculation Formula
    values:
      - name: OLD_FORMULA
        value: 0
      - name: NEW_FORMULA
        value: 1
  # Holding register 16.
  - type_id: country_select_state
    name: Country Select State
    values:
      - name: NEED_TO_SELECT
        value: 0
      - name: SELECTED
        value: 1

devices:
  - device_id: growatt-sph
    vendor: Growatt
    model: SPH (hybrid storage)
    family: Growatt SPH
    supported_transports: [MODBUS_RTU, MODBUS_TCP]
    blocks:
      # ---------------------------------------------------------------------
      # Common inverter settings, "First group" (holding registers NO.0-124,
      # function 0x03)
      # ---------------------------------------------------------------------
      - block_id: common_settings
        name: Common Inverter Settings
        space: HOLDING_REGISTER
        start_offset: 0
        length_words: 125
        points:
          - point_id: remote_on_off
            name: Remote On/Off
            description: Remote on/off for the inverter and the BDC (OnOff)
            access: READ_WRITE
            storage_type: U16
            value_type:
              enum_ref: { type_id: remote_on_off_state }
            mapping: { space: HOLDING_REGISTER, offset: 0, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1, 2, 3]

          - point_id: safety_function_enable
            name: Safety Function Enable
            description: Per-bit grid safety function enables (Safty Function Enable; bits 0-3 CEI0-21, bits 4-6 SAA)
            access: READ_WRITE
            storage_type: U16
            value_type:
              flags:
                bits:
                  "0": spi_enable
                  "1": auto_test_start
                  "2": lvfrt_enable
                  "3": freq_derating_enable
                  "4": soft_start_enable
                  "5": drms_enable
                  "6": power_volt_func_enable
                  "7": hvfrt_enable
                  "8": rocof_enable
                  "9": recover_freq_derating_enable
                  "10": split_phase_enable
                  "11": ac_couple_enable
            mapping: { space: HOLDING_REGISTER, offset: 1, length_words: 1 }
            write:
              behavior: DIRECT

          - point_id: settings_memory_state
            name: Settings Memory State
            description: Whether holding registers 3, 4, 5, 99 persist across power cycles (PF CMD memory state)
            access: READ_WRITE
            storage_type: U16
            value_type:
              enum_ref: { type_id: enable_state }
            mapping: { space: HOLDING_REGISTER, offset: 2, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]

          - point_id: active_power_rate
            name: Active Power Rate
            description: Inverter max output active power percent (Active Power Rate; 255 = power not limited)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: "%"
            na_values: [{ raw: 255, meaning: not_limited }]
            mapping: { space: HOLDING_REGISTER, offset: 3, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 0, denominator: 1 }
                max_value: { numerator: 255, denominator: 1 }

          - point_id: reactive_power_rate
            name: Reactive Power Rate
            description: Inverter max output reactive power percent, -100 to 100 (Reactive Power Rate; 255 = not limited)
            access: READ_WRITE
            storage_type: S16
            value_type: { primitive: DECIMAL }
            unit: "%"
            na_values: [{ raw: 255, meaning: not_limited }]
            mapping: { space: HOLDING_REGISTER, offset: 4, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: -100, denominator: 1 }
                max_value: { numerator: 255, denominator: 1 }

          - point_id: power_factor_set
            name: Power Factor Setpoint
            description: Inverter output power factor x10000; 0-10000 underexcited, 10001-20000 overexcited (Power factor)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            transform: { scale: { numerator: 1, denominator: 10000 } }
            mapping: { space: HOLDING_REGISTER, offset: 5, length_words: 1 }
            write:
              behavior: DIRECT

          - point_id: rated_power
            name: Rated Power
            description: Normal (nameplate) apparent power (Pmax H/L)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            unit: VA
            mapping:
              space: HOLDING_REGISTER
              offset: 6
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            transform: { scale: { numerator: 1, denominator: 10 } }

          - point_id: rated_pv_voltage
            name: Rated PV Voltage
            description: Normal working PV voltage (Vnormal)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 8, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            measurand: { base_quantity: pv_voltage }

          - point_id: firmware_version
            name: Firmware Version
            description: Firmware version, 2 ASCII chars per register (Fw version H/M/L)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              offset: 9
              length_words: 3
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              string_encoding: { charset: ASCII, padding: PADDING_SPACE, termination: FIXED_LENGTH }

          - point_id: control_firmware_version
            name: Control Firmware Version
            description: Control firmware version, 2 ASCII chars per register (Fw version2 H/M/L)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              offset: 12
              length_words: 3
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              string_encoding: { charset: ASCII, padding: PADDING_SPACE, termination: FIXED_LENGTH }

          - point_id: lcd_language
            name: LCD Language
            description: Display language (LCD language)
            access: READ_WRITE
            storage_type: U16
            value_type:
              enum_ref: { type_id: lcd_language }
            mapping: { space: HOLDING_REGISTER, offset: 15, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1, 2, 3, 4, 5, 6, 7, 8]

          - point_id: country_selected
            name: Country Selected
            description: Whether a grid country/standard has been selected (Country Selected)
            access: READ_WRITE
            storage_type: U16
            value_type:
              enum_ref: { type_id: country_select_state }
            mapping: { space: HOLDING_REGISTER, offset: 16, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]

          - point_id: pv_start_voltage
            name: PV Start Voltage
            description: PV input start voltage (Vpv start)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 17, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            write:
              behavior: DIRECT

          - point_id: start_delay_time
            name: Start Delay Time
            description: Delay before the inverter starts feeding (Time start)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: s
            mapping: { space: HOLDING_REGISTER, offset: 18, length_words: 1 }
            write:
              behavior: DIRECT

          - point_id: restart_delay_time
            name: Restart Delay Time
            description: Restart delay time after a fault clears (RestartDelayTime)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: s
            mapping: { space: HOLDING_REGISTER, offset: 19, length_words: 1 }
            write:
              behavior: DIRECT

          - point_id: power_start_slope
            name: Power Start Slope
            description: Output power ramp-up slope at start (Power Start Slope)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: "%"
            mapping: { space: HOLDING_REGISTER, offset: 20, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            write:
              behavior: DIRECT

          - point_id: power_restart_slope
            name: Power Restart Slope
            description: Output power ramp-up slope after restart (Power Restart Slope)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: "%"
            mapping: { space: HOLDING_REGISTER, offset: 21, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            write:
              behavior: DIRECT

          - point_id: baud_rate
            name: Baud Rate
            description: RS-485 communication baud rate (Select Baud rate)
            access: READ_WRITE
            storage_type: U16
            value_type:
              enum_ref: { type_id: baud_rate_select }
            mapping: { space: HOLDING_REGISTER, offset: 22, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]

          - point_id: serial_number
            name: Serial Number
            description: Device serial number, 2 ASCII chars per register (Serial NO 1-10)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              offset: 23
              length_words: 5
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              string_encoding: { charset: ASCII, padding: PADDING_SPACE, termination: FIXED_LENGTH }

          - point_id: module_code
            name: Inverter Module Code
            description: Inverter module code (Module H/L)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: UINT32 }
            mapping:
              space: HOLDING_REGISTER
              offset: 28
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN

          - point_id: modbus_address
            name: Modbus Address
            description: RS-485 communication address (Com Address)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 30, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 1, denominator: 1 }
                max_value: { numerator: 254, denominator: 1 }

          - point_id: firmware_update
            name: Firmware Update Trigger
            description: Write 1 to start a firmware update (FlashStart)
            access: COMMAND
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 31, length_words: 1 }
            write:
              behavior: COMMAND_TRIGGER
              constraints:
                allowed_values: [1]

          - point_id: reset_user_info
            name: Reset User Information
            description: Write 0x0001 to reset user information (Reset User Info)
            access: COMMAND
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 32, length_words: 1 }
            write:
              behavior: COMMAND_TRIGGER
              constraints:
                allowed_values: [1]

          - point_id: reset_to_factory
            name: Reset To Factory
            description: Write 0x0001 to reset to factory defaults (Reset to factory)
            access: COMMAND
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 33, length_words: 1 }
            write:
              behavior: COMMAND_TRIGGER
              constraints:
                allowed_values: [1]
                safety_note: Resets all configuration to factory defaults.

          - point_id: manufacturer_info
            name: Manufacturer Information
            description: Manufacturer information, 2 ASCII chars per register (Manufacturer Info 8-1)
            access: READ_ONLY
            storage_type: STRING_ASCII
            value_type: { primitive: STRING }
            mapping:
              space: HOLDING_REGISTER
              offset: 34
              length_words: 8
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
              string_encoding: { charset: ASCII, padding: PADDING_SPACE, termination: FIXED_LENGTH }

          - point_id: g100_failsafe_enable
            name: G100 Fail Safe Enable
            description: UK G100 fail safe enable (bfailsafeEn)
            access: READ_WRITE
            storage_type: U16
            value_type:
              enum_ref: { type_id: enable_state }
            mapping: { space: HOLDING_REGISTER, offset: 42, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                allowed_values: [0, 1]

          - point_id: device_type_code
            name: Device Type Code
            description: Device type code (DTC)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 43, length_words: 1 }

          - point_id: tracker_phase_config
            name: Tracker And Phase Configuration
            description: Input tracker count (high byte) and output phase count (low byte); e.g. 0x0203 = 2 MPPT, 3-phase (TP)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            fields:
              - field_id: tracker_count
                name: Tracker Count
                bit_offset: 8
                bit_length: 8
                value_type: { primitive: UINT32 }
              - field_id: phase_count
                name: Phase Count
                bit_offset: 0
                bit_length: 8
                value_type: { primitive: UINT32 }
            mapping: { space: HOLDING_REGISTER, offset: 44, length_words: 1 }

          - point_id: sys_time_year
            name: System Time Year
            description: System time - year (Sys Year; local time, year offset 0)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 45, length_words: 1 }
            write:
              behavior: DIRECT

          - point_id: sys_time_month
            name: System Time Month
            description: System time - month (Sys Month)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 46, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 1, denominator: 1 }
                max_value: { numerator: 12, denominator: 1 }

          - point_id: sys_time_day
            name: System Time Day
            description: System time - day of month (Sys Day)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 47, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 1, denominator: 1 }
                max_value: { numerator: 31, denominator: 1 }

          - point_id: sys_time_hour
            name: System Time Hour
            description: System time - hour (Sys Hour)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 48, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 0, denominator: 1 }
                max_value: { numerator: 23, denominator: 1 }

          - point_id: sys_time_minute
            name: System Time Minute
            description: System time - minute (Sys Min)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 49, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 0, denominator: 1 }
                max_value: { numerator: 59, denominator: 1 }

          - point_id: sys_time_second
            name: System Time Second
            description: System time - second (Sys Sec)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 50, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 0, denominator: 1 }
                max_value: { numerator: 59, denominator: 1 }

          - point_id: sys_time_weekday
            name: System Time Weekday
            description: System time - day of week, 0-6 (Sys Weekly)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            mapping: { space: HOLDING_REGISTER, offset: 51, length_words: 1 }
            write:
              behavior: DIRECT
              constraints:
                min_value: { numerator: 0, denominator: 1 }
                max_value: { numerator: 6, denominator: 1 }

          - point_id: vac_low_protect
            name: Grid Voltage Low Protect Limit 1
            description: Grid voltage low limit protect, level 1 (Vac low)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 52, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            write:
              behavior: DIRECT

          - point_id: vac_high_protect
            name: Grid Voltage High Protect Limit 1
            description: Grid voltage high limit protect, level 1 (Vac high)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: V
            mapping: { space: HOLDING_REGISTER, offset: 53, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 10 } }
            write:
              behavior: DIRECT

          - point_id: fac_low_protect
            name: Grid Frequency Low Protect Limit 1
            description: Grid frequency low limit protect, level 1 (Fac low)
            access: READ_WRITE
            storage_type: U16
            value_type: { primitive: DECIMAL }
            unit: Hz
            mapping: { space: HOLDING_REGISTER, offset: 54, length_words: 1 }
            transform: { scale: { numerator: 1, denominator: 100 } }
