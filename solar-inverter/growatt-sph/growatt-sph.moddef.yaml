      # ---------------------------------------------------------------------
      # Extended storage telemetry, "Ninth group reserved for storage power"
      # (input registers NO.1126-1249, function 0x04). Input 1131-1140 are
      # documented SPA-only (extra inverter / Esystem) and omitted; 1170-1198
      # and 1219-1247 are reserved.
      # ---------------------------------------------------------------------
      - block_id: storage_ext_live
        name: Extended Storage Telemetry
        space: INPUT_REGISTER
        start_offset: 1126
        length_words: 124
        points:
          - point_id: ac_charge_energy_total
            name: AC Charge Energy Total
            description: Lifetime AC charge energy (AC Charge Energy Total H/L)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            unit: kWh
            mapping:
              space: INPUT_REGISTER
              offset: 1126
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            measurand:
              base_quantity: energy_active
              direction: CHARGE
              accumulation: REGISTER

          - point_id: ac_charge_power
            name: AC Charge Power
            description: Instantaneous AC charge power (AC Charge Power H/L)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            unit: W
            mapping:
              space: INPUT_REGISTER
              offset: 1128
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            measurand: { base_quantity: active_power, direction: CHARGE }

