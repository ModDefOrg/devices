      # ---------------------------------------------------------------------
      # Live telemetry, "First group" (input registers NO.0-124, function 0x04)
      # The register map provides up to 8 PV string inputs; SPH hardware
      # populates only the strings it has (readings are 0 on absent strings).
      # Input 96 and 106 are reserved. Input 108-109 are SPA-only
      # (RemoteCtrlEn/RemoteCtrlPower) and omitted. Input 113-115 are
      # overloaded per model (MAX: power percent/fault codes vs Storage:
      # EACharge energy words with the H word colliding with warn maincode at
      # 112) and are omitted; the same AC-charge energies are unambiguous at
      # input 1124-1127.
      # ---------------------------------------------------------------------
      - block_id: ac_live
        name: AC / PV Live Telemetry
        space: INPUT_REGISTER
        start_offset: 0
        length_words: 125
        points:
          - point_id: inverter_status
            name: Inverter Status
            description: Inverter run state (0 waiting, 1 normal, 3 fault)
            access: READ_ONLY
            storage_type: U16
            value_type:
              enum_ref: { type_id: inverter_run_state }
            mapping: { space: INPUT_REGISTER, offset: 0, length_words: 1 }
            measurand: { base_quantity: inverter_status }

          - point_id: pv_power_total
            name: PV Input Power Total
            description: Total PV input power across all MPPT strings (Ppv)
            access: READ_ONLY
            storage_type: U32
            value_type: { primitive: DECIMAL }
            unit: W
            mapping:
              space: INPUT_REGISTER
              offset: 1
              length_words: 2
              byte_order: BIG_ENDIAN
              word_order: WORD_BIG_ENDIAN
            transform: { scale: { numerator: 1, denominator: 10 } }
            measurand: { base_quantity: pv_power }

          - point_id: pv1_voltage
