            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1002, length_words: 1 }
            measurand: { base_quantity: fault_code }

          - point_id: system_fault_word_2
            name: System Fault Word 2
            description: System fault word 2 (Systemfault word2)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1003, length_words: 1 }
            measurand: { base_quantity: fault_code }

          - point_id: system_fault_word_3
            name: System Fault Word 3
            description: System fault word 3 (Systemfault word3)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1004, length_words: 1 }
            measurand: { base_quantity: fault_code }

          - point_id: system_fault_word_4
            name: System Fault Word 4
            description: System fault word 4 (Systemfault word4)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1005, length_words: 1 }
            measurand: { base_quantity: fault_code }

          - point_id: system_fault_word_5
            name: System Fault Word 5
            description: System fault word 5 (Systemfault word5)
            access: READ_ONLY
            storage_type: U16
            value_type: { primitive: UINT32 }
            mapping: { space: INPUT_REGISTER, offset: 1006, length_words: 1 }
            measurand: { base_quantity: fault_code }

